<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#00855B">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FASSTO 상차 관리 앱 v37</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--g:#00855B;--gd:#005E3E;--slate:#333D4B;--gray:#6B7684;--bd:#E5E8EB;--tint:#F4FAF7;--tint2:#D9F0E5;--red:#C0392B;--redbg:#FFF5F5;--yellow:#FFF8E1;--yellowbd:#E6C36A;--pink:#FFE0EA;--pinkbd:#FF7FA4;--pinktxt:#A80036;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;background:#F7F9F8;color:var(--slate);font-size:16px;}
  header{background:var(--g);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:10;}
  .brand{font-weight:800;font-size:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .logoutBtn{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;}
  .wd{margin-top:6px;font-size:12px;color:#D6ECE2;}
  .mycenter{margin-top:8px;display:flex;flex-direction:column;gap:4px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:9px 10px;font-size:13px;line-height:1.45;}
  .mycenter b{font-size:14px;color:#fff;}
  .loginMeta{font-size:12px;color:#E4F5EE;}
  .gsBanner{padding:7px 14px;font-size:12px;font-weight:700;text-align:center;border-bottom:1px solid var(--bd);}
  .gsBanner.ok{background:#E8F5E9;color:#1B5E20;}.gsBanner.fail{background:var(--redbg);color:var(--red);}.gsBanner.loading{background:var(--yellow);color:#7A5B00;}
  main{padding:14px;max-width:560px;margin:0 auto;padding-bottom:40px;}
  h2{font-size:20px;margin:4px 0 14px;color:var(--slate);}
  .grouplabel{font-size:12px;font-weight:800;color:var(--g);margin:16px 0 8px;}
  .card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px;}
  .navrow{display:flex;align-items:center;background:#fff;border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;}
  .navrow.funcCard{padding:20px 16px;min-height:100px;border-radius:16px;box-shadow:0 4px 14px rgba(0,94,62,.08);}
  .navrow .blk{width:52px;height:52px;border-radius:12px;background:var(--g);color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex:0 0 52px;}
  .navrow .blk.dk{background:var(--gd);} .navrow .blk.gray{background:#6B7684;}
  .navrow.funcCard .blk{width:62px;height:62px;border-radius:16px;font-size:20px;flex-basis:62px;}
  .navrow .txt{flex:1;margin-left:12px;}.navrow .t{font-weight:800;font-size:16px;}.navrow.funcCard .t{font-size:20px;}.navrow .d{font-size:12.5px;color:var(--gray);margin-top:3px;}.navrow.funcCard .d{font-size:14px;margin-top:5px;}
  .navrow .badge{font-weight:800;color:var(--gd);font-size:16px;margin-right:8px;background:var(--tint);border:1px solid var(--tint2);border-radius:10px;padding:6px 10px;min-width:40px;text-align:center;}
  .navrow .chev{color:var(--gray);font-size:20px;}
  .btn{display:block;width:100%;padding:15px;border:none;border-radius:13px;font-size:17px;font-weight:800;color:#fff;background:var(--g);margin-bottom:10px;min-height:54px;}
  .btn.dk{background:var(--gd);} .btn.ghost{background:#fff;color:var(--g);border:2px solid var(--g);} .btn.danger{background:#fff;color:var(--red);border:2px solid var(--red);} .btn:disabled{opacity:.4;}
  .row2{display:flex;gap:8px;} .row2 .btn{flex:1;}
  input[type=text],select.formsel{width:100%;padding:13px;border:2px solid var(--bd);border-radius:10px;font-size:16px;background:#fff;min-height:52px;}
  label{display:block;font-size:12px;font-weight:800;color:var(--gray);margin:10px 0 5px;}
  .list{list-style:none;margin:0;padding:0;}.li{display:flex;align-items:center;justify-content:space-between;padding:13px 12px;border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;background:#fff;gap:8px;min-height:62px;}.code{font-family:Consolas,monospace;font-weight:700;font-size:16px;}.meta{font-size:12px;color:var(--gray);margin-top:3px;}
  .pill{font-size:12px;font-weight:700;padding:4px 9px;border-radius:20px;display:inline-block;}.pill.day{background:var(--tint2);color:var(--gd);}.pill.norm{background:#EEF1F4;color:var(--gray);}.pill.viol{background:#FFF5F5;color:var(--red);}.pill.off{background:#EEF1F4;color:#8B95A1;}.pill.warn{background:#FFF8E1;color:#B8860B;border:1px solid #E6C36A;}
  .del{background:none;border:none;color:var(--red);font-size:14px;font-weight:800;padding:8px;}
  .kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}.kpi3{grid-template-columns:1fr 1fr 1fr;}.kpi div{background:var(--tint);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center;}.kpi .n{font-size:28px;font-weight:800;color:var(--gd);}.kpi .l{font-size:12px;color:var(--gray);margin-top:3px;}.kpi .pink{background:var(--pink);border-color:var(--pinkbd);}.kpi .pink .n,.kpi .pink .l{color:var(--pinktxt);font-weight:900;}
  .sub{font-size:12px;color:var(--gray);font-weight:700;margin:14px 0 6px;}.empty{color:var(--gray);font-size:14px;text-align:center;padding:20px;}
  #reader{border-radius:12px;overflow:hidden;margin-bottom:10px;}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 18px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:50;max-width:90%;text-align:center;}.toast.show{opacity:1;}.toast.err{background:var(--red);}.toast.warn{background:#B8860B;}
  .sessionbar{background:var(--tint2);border:1px solid var(--g);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--gd);font-weight:700;margin-bottom:10px;}.note{background:var(--redbg);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:11px;font-size:13px;margin-bottom:10px;line-height:1.5;}.info{background:var(--tint);border:1px solid var(--tint2);color:var(--gd);border-radius:10px;padding:11px;font-size:13px;margin-bottom:10px;font-weight:700;line-height:1.5;}
  .pageBack{display:flex;align-items:center;width:100%;min-height:56px;border:2px solid var(--yellowbd);background:var(--yellow);color:#3A2A00;font-weight:900;border-radius:14px;padding:14px 16px;margin:0 0 14px;font-size:17px;box-shadow:0 4px 12px rgba(120,90,0,.15);}
  .readyChoiceGrid{display:grid;grid-template-columns:1fr;gap:12px;margin:10px 0 14px;}.readyChoiceCard{width:100%;border:2px solid var(--bd);background:#fff;border-radius:18px;padding:22px 18px;text-align:left;cursor:pointer;box-shadow:0 6px 18px rgba(0,94,62,.08);min-height:140px;display:flex;align-items:center;gap:16px;}.readyChoiceCard .icon{width:70px;height:70px;border-radius:18px;background:var(--g);color:#fff;font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;flex:0 0 70px;}.readyChoiceCard .title{font-size:22px;font-weight:900;color:var(--slate);}.readyChoiceCard .desc{font-size:14px;color:var(--gray);margin-top:5px;font-weight:700;}.selectedType{background:var(--tint);border:1.5px solid var(--tint2);border-radius:14px;padding:11px 14px;margin:0 0 12px;font-size:15px;font-weight:900;color:var(--gd);}
  .inputChoiceGrid{display:grid;gap:12px;margin:10px 0 14px;}.inputChoiceCard{width:100%;border:2px solid var(--bd);background:#fff;border-radius:18px;padding:20px 18px;text-align:left;cursor:pointer;box-shadow:0 6px 18px rgba(0,94,62,.08);}.inputChoiceCard.scan{display:flex;align-items:center;gap:16px;border-color:var(--tint2);}.inputChoiceCard .icon{width:70px;height:70px;border-radius:18px;background:var(--g);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;flex:0 0 70px;}.inputChoiceCard .title{font-size:20px;font-weight:900;color:var(--slate);}.inputChoiceCard .desc{font-size:14px;color:var(--gray);margin-top:5px;font-weight:700;}
  .crumb{background:#fff;border-bottom:1px solid var(--bd);padding:9px 14px;font-size:13px;color:var(--gray);display:flex;align-items:center;gap:6px;}.crumb b{color:var(--gd);}.back{background:var(--yellow);border:1.5px solid var(--yellowbd);color:#3A2A00;font-weight:900;font-size:14px;padding:7px 12px;border-radius:999px;}
  .acctActions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}.miniBtn{border:1px solid var(--bd);background:#fff;border-radius:8px;padding:7px 9px;font-size:12px;font-weight:800;color:var(--slate);}.miniBtn.green{border-color:var(--g);color:var(--g);}.miniBtn.red{border-color:var(--red);color:var(--red);}
  .loginBox{background:#fff;border:1px solid var(--bd);border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(0,94,62,.08);}.loginTitle{font-size:24px;font-weight:900;margin:4px 0 8px;}.loginHelp{font-size:14px;color:var(--gray);font-weight:700;line-height:1.5;margin-bottom:14px;}.modeSel{padding:7px 8px;border-radius:8px;border:none;background:#fff;color:var(--slate);font-size:12px;font-weight:800;max-width:120px;}

  .labelView{display:inline-flex;flex-direction:column;align-items:flex-start;justify-content:center;line-height:1.05;vertical-align:middle;margin-right:6px;}
  .labelTail{font-family:Consolas,monospace;font-weight:900;font-size:34px;letter-spacing:1px;color:var(--slate);}
  .labelFull{font-family:Consolas,monospace;font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.2px;margin-top:3px;}
  .labelView.small .labelTail{font-size:26px;}
  .labelView.small .labelFull{font-size:10px;}
  .reserveCard{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:13px;margin-bottom:10px;box-shadow:0 3px 10px rgba(0,94,62,.05);} 
  .reserveHead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .reserveVeh{font-size:22px;font-weight:900;color:var(--slate);letter-spacing:.5px;}
  .reserveMeta{font-size:12px;color:var(--gray);font-weight:700;margin-top:2px;line-height:1.45;}
  .reserveLine{display:grid;grid-template-columns:1fr 72px;gap:8px;align-items:center;border:1px solid var(--bd);border-radius:10px;padding:9px 10px;margin-bottom:7px;background:#FAFBFC;}
  .reserveLine b{font-size:14px;color:var(--slate);} .reserveLine small{display:block;color:var(--gray);font-size:11px;margin-top:2px;}
  .reserveInput{width:100%;padding:10px;border:2px solid var(--bd);border-radius:10px;font-size:18px;font-weight:900;text-align:center;background:#fff;min-height:46px;}
  .tabBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .tag{display:inline-block;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;background:var(--tint);color:var(--gd);border:1px solid var(--tint2);}


  /* 전체 센터 현황표: 기능별 그룹 시각 구분 */
  .dashTableWrap{overflow-x:visible;background:#fff;border:1px solid var(--bd);border-radius:14px;margin-top:8px;box-shadow:0 4px 12px rgba(0,94,62,.06);}
  .dashTable{width:100%;border-collapse:separate;border-spacing:0;min-width:0;table-layout:fixed;font-size:13px;}
  .dashTable col.colCenter{width:31%;}
  .dashTable col.colMetric{width:9.85%;}
  .dashTable th,.dashTable td{border-right:1px solid #DDE3E0;border-bottom:1px solid #E6ECE9;}
  .dashTable th:last-child,.dashTable td:last-child{border-right:none;}
  .dashGroupHead th{padding:9px 6px;text-align:center;font-weight:900;color:#153528;font-size:13px;border-bottom:2px solid #C7D6CF;}
  .dashCenterHead{background:var(--g)!important;color:#fff!important;text-align:left!important;padding-left:12px!important;vertical-align:middle;position:sticky;left:0;z-index:2;}
  .dashGroupHead .readyGroup{background:#EAF3FF;}
  .dashGroupHead .reserveGroup{background:#E8F5E9;border-left:3px solid #6CBF84;}
  .dashGroupHead .doneGroup{background:#EEF6F3;border-left:3px solid #8FB8A8;}
  .dashSubHead th{padding:8px 6px;text-align:center;font-weight:900;white-space:nowrap;color:#263238;font-size:12px;}
  .dashSubHead .readyDay{background:#FFEAF2;}
  .dashSubHead .readyNorm{background:#FFF8E1;}
  .dashSubHead .reserved{background:#E8F5E9;}
  .dashSubHead .unassigned{background:#FFF0F0;}
  .dashSubHead .overReserved{background:#FFF2CC;}
  .dashSubHead .loaded{background:#F1F6F4;}
  .dashCenter{padding:9px 10px;font-weight:800;font-size:13px;white-space:nowrap;background:#fff;position:sticky;left:0;z-index:1;}
  .dashCenter span{color:var(--gray);font-size:11px;font-weight:700;}
  .dashNum,.dashTotal{padding:8px 6px;text-align:center;font-size:15px;color:var(--gray);font-weight:700;background:#fff;white-space:nowrap;}
  .dashNum span,.dashTotal span{font-size:10px;font-weight:500;color:inherit;}
  .dashNum.readyDay.hasVal,.dashTotal.readyDay.hasVal{background:#FFF0F5;color:var(--pinktxt);font-weight:900;}
  .dashNum.readyNorm.hasVal,.dashTotal.readyNorm.hasVal{background:#FFF8E1;color:#7A5B00;font-weight:900;}
  .dashNum.reserved.hasVal,.dashTotal.reserved.hasVal{background:var(--tint);color:var(--gd);font-weight:900;}
  .dashNum.unassigned.hasVal,.dashTotal.unassigned.hasVal{background:var(--redbg);color:var(--red);font-weight:900;}
  .dashNum.overReserved.hasVal,.dashTotal.overReserved.hasVal{background:#FFF8E1;color:#B8860B;font-weight:900;}
  .dashNum.loaded,.dashTotal.loaded{color:var(--gd);font-weight:900;background:#FAFCFB;}
  .dashRow:nth-child(even) .dashCenter,.dashRow:nth-child(even) .dashNum{background-color:#FCFDFD;}
  .dashRow:hover .dashCenter,.dashRow:hover .dashNum{outline:2px solid rgba(0,133,91,.08);background-color:#F8FCFA;}
  .dashTable .groupEnd{border-right:3px solid #AFC5BB!important;}
  .dashGroupGap td{height:3px!important;padding:0!important;background:#D8E2DD!important;border:none!important;}
  .dashSumRow .dashCenter,.dashSumRow .dashTotal{background:#D9F0E5!important;border-top:2px solid var(--g);font-weight:900;}
  .dashLegend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:10px;font-size:11px;font-weight:800;color:var(--gray);}
  .dashLegend .lg{border-radius:999px;padding:5px 8px;background:#F2F4F6;}
  .dashLegend .ready{background:#EAF3FF;color:#1C4E80;}
  .dashLegend .reserve{background:#E8F5E9;color:var(--gd);}
  .dashLegend .done{background:#EEF6F3;color:#466B5C;}
  .dashLegend .warn{background:#FFF0F0;color:var(--red);}

  /* PC/마스터 화면: 가로 스크롤 없이 전체 펼침 */
  @media (min-width: 900px){
    main{max-width:1180px;}
    .dashCenterHead,.dashCenter{position:static;}
    .dashSubHead th{font-size:12px;padding:9px 5px;}
    .dashNum,.dashTotal{font-size:15px;padding:9px 5px;}
    .dashCenter{font-size:13px;}
  }
  /* 모바일/좁은 화면: 화면이 너무 좁으면 가로 스크롤 허용 */
  @media (max-width: 899px){
    .dashTableWrap{overflow-x:auto;}
    .dashTable{min-width:760px;table-layout:auto;}
    .dashCenterHead{position:sticky;left:0;z-index:2;}
    .dashCenter{position:sticky;left:0;z-index:1;}
  }


</style>
</head>
<body>
<header>
  <div class="brand"><span>FASSTO 상차 관리 앱</span><button id="logoutBtn" class="logoutBtn" style="display:none" onclick="logout()">로그아웃</button></div>
  <div class="wd" id="wdLabel"></div>
  <div class="mycenter" id="myCenterBar" style="display:none"></div>
</header>
<div id="gsBanner" class="gsBanner loading">구글 시트 연결 확인 중...</div>
<div id="crumb" class="crumb" style="display:none"></div>
<main id="app"></main>
<div id="toast" class="toast"></div>
<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbxeH-UJbv98tRwqn32EYNNBmnahTmnuOHoq00pTDOjISyppRgtAFluPs4fTpgXUkyp5Dw/exec";
const GROUPS=[{name:"용인1센터",floors:[["YI00","지하1층"],["YI01","1층"],["YI02","2층"],["YI03","3층"]]},{name:"용인2센터",floors:[["YI21","1층"],["YI22","2층"],["YI23","3층"]]}];
const FLOOR={}; GROUPS.forEach(g=>g.floors.forEach(f=>FLOOR[f[0]]={group:g.name,floor:f[1]}));
function centerName(c){return c==="ALL"?"전 센터":(FLOOR[c]?FLOOR[c].group+" "+FLOOR[c].floor:c);}
function centerOptions(sel,all){let o=all?`<option value="">전 센터</option>`:"";GROUPS.forEach(g=>g.floors.forEach(([code,fl])=>o+=`<option value="${code}" ${sel===code?"selected":""}>${g.name} ${fl} (${code})</option>`));return o;}
function pad2(n){return String(n).padStart(2,"0");}
function normDtype(v){const s=String(v||"").trim();return (!s||s==="-")?"전체":s;}
function displayDtype(v){const s=normDtype(v);return s==="전체"?"유형미확인":s;}
function dtypePillClass(v){const s=normDtype(v);return s==="당일"?"day":(s==="일반"?"norm":"warn");}
function kstDateString(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function normalizeDateForApp(v){
  const s=String(v||"").trim();
  if(!s) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    const d=new Date(s);
    return kstDateString(d);
  }
  const d=new Date(s);
  if(!isNaN(d.getTime())) return kstDateString(d);
  return s.slice(0,10);
}
function isDeletedFlag(v){return String(v||"").trim().toUpperCase()==="Y";}
function kstNow(){
  const parts = new Intl.DateTimeFormat("en-CA",{
    timeZone:"Asia/Seoul", year:"numeric", month:"2-digit", day:"2-digit",
    hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false, hourCycle:"h23"
  }).formatToParts(new Date()).reduce((a,p)=>{a[p.type]=p.value;return a;},{});
  return new Date(Number(parts.year), Number(parts.month)-1, Number(parts.day), Number(parts.hour), Number(parts.minute), Number(parts.second));
}
function fmtDate(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function fmtTime(d){return pad2(d.getHours())+":"+pad2(d.getMinutes())+":"+pad2(d.getSeconds());}

function displayTime(v){
  const s=String(v||"").trim();
  if(!s) return "";
  // Google Sheets의 시간 전용 셀이 Apps Script JSON으로 넘어오면
  // 1899-12-30T02:17:52.000Z 같은 ISO 문자열이 될 수 있습니다.
  // 이 경우 날짜는 의미가 없으므로 HH:mm:ss만 표시합니다.
  const iso=s.match(/(?:1899-12-30|1899-12-29|1970-01-01)T(\d{2}:\d{2}(?::\d{2})?)/);
  if(iso) return iso[1].length===5?iso[1]+":00":iso[1];
  const timeOnly=s.match(/^(?:오전|오후)?\s*\d{1,2}:\d{2}(?::\d{2})?/);
  if(timeOnly) return s;
  const generic=s.match(/T(\d{2}:\d{2}(?::\d{2})?)/);
  if(generic) return generic[1].length===5?generic[1]+":00":generic[1];
  return s;
}
function workingDay(){
  const d = kstNow();
  if(d.getHours() < 7) d.setDate(d.getDate()-1);
  return fmtDate(d);
}
let CACHE=JSON.parse(localStorage.getItem("fs_cache")||"{}");
let CACHE_SAVE_WARNED=false;
function saveCache(){
  try{
    const today=workingDay();
    const todayDate=new Date(today+"T00:00:00");
    function isRecent(wd){
      if(!wd) return false;
      const d=new Date(wd+"T00:00:00");
      return (todayDate-d)<=3*24*60*60*1000;
    }
    if(CACHE.ready&&CACHE.ready.length>0) CACHE.ready=CACHE.ready.filter(function(r){return isRecent(r.wd);});
    if(CACHE.loading&&CACHE.loading.length>0) CACHE.loading=CACHE.loading.filter(function(r){return isRecent(r.wd);});
    if(CACHE.photos&&CACHE.photos.length>0) CACHE.photos=CACHE.photos.filter(function(p){return isRecent(p.wd);});
    localStorage.setItem("fs_cache",JSON.stringify(CACHE));
  }catch(e){
    if(!CACHE_SAVE_WARNED){
      CACHE_SAVE_WARNED=true;
      try{ if(typeof toast==="function") toast("캐시 저장 실패 — 저장공간이 부족할 수 있습니다","warn"); }catch(_e){}
    }
  }
}

  // 수기: 일단 허용 (운영정책상 전체번호 입력 예정이나 방어 느슨하게)
  var v=normalizeLabelInput(raw);
  if(!v) return {ok:false,msg:"라벨번호를 입력하세요"};
  if(isScan && v.length < 5) return {ok:false,msg:"바코드 스캔값이 너무 짧습니다. 다시 스캔하세요"};
  return {ok:true,value:v};
}
function escapeHtml(s){
  return String(s||"").replace(/[&<>'"]/g,function(ch){return ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"})[ch]||ch;});
}
function labelTail(code){
  const s=String(code||"");
  return s.length>=4?s.slice(-4):s;
}
function labelView(code,cls,method){
  const s=String(code||"");
  const isManual=String(method||"").indexOf("수기")>=0;
  const main=(isManual&&s.length<=4)?s:labelTail(s);
  const sub=isManual?(s.length>4?s:"수기 입력"):s;
  return "<span class='labelView "+(cls||"")+"'><span class='labelTail'>"+escapeHtml(main)+"</span><span class='labelFull'>"+escapeHtml(sub)+"</span></span>";
}
function jsArg(v){return encodeURIComponent(String(v||""));}
function labelCompareKey(code){
  const digits=String(code||"").replace(/\D/g,"");
  if(!digits) return "";
  const base=digits.length>=4?digits.slice(-4):digits;
  const normalized=String(Number(base));
  return normalized==="NaN"?base.replace(/^0+/,"")||"0":normalized;
}
function findSimilarLabels(code,items){
  const key=labelCompareKey(code);
  if(!key) return [];
  const exact=String(code||"");
  const seen={};
  return (items||[]).filter(function(it){
    const c=String((it&&it.code)||"");
    if(!c||c===exact) return false;
    if(labelCompareKey(c)!==key) return false;
    if(seen[c]) return false;
    seen[c]=true;
    return true;
  });
}
function confirmSimilarLabel(inputCode,similarItems,context){
  if(!similarItems||!similarItems.length) return true;
  const list=similarItems.slice(0,5).map(function(it){
    return "- "+it.code+(it.dtype?" ("+it.dtype+")":"");
  }).join("\n");
  const more=similarItems.length>5?"\n외 "+(similarItems.length-5)+"건":"";
  const msg="⚠ 뒷자리 숫자가 같은 라벨이 이미 있습니다.\n\n"+
    "입력값: "+inputCode+"\n"+
    "기존 라벨:\n"+list+more+"\n\n"+
    "같은 파렛트일 가능성이 있습니다.\n"+
    "그래도 "+(context||"진행")+"하시겠습니까?";
  return confirm(msg);
}

// 중복 스캔/저장 연타 방지
const SCAN_COOLDOWN_MS = 1000;
let SCAN_LOCK_UNTIL = 0;
let ACTION_LOCKS = {};
function scanGuard(){
  const now = Date.now();
  if(now < SCAN_LOCK_UNTIL) return false;
  SCAN_LOCK_UNTIL = now + SCAN_COOLDOWN_MS;
  return true;
}
function actionLock(key){
  if(ACTION_LOCKS[key]) return false;
  ACTION_LOCKS[key] = true;
  return true;
}
function actionUnlock(key){ delete ACTION_LOCKS[key]; }
function lockButton(label){
  let btn = null;
  try{ btn = (typeof event !== "undefined" && event && event.currentTarget && event.currentTarget.tagName === "BUTTON") ? event.currentTarget : null; }catch(e){}
  if(btn){
    btn.disabled = true;
    btn.dataset.oldText = btn.textContent || "";
    if(label) btn.textContent = label;
  }
  return btn;
}
function unlockButton(btn){
  if(btn){
    btn.disabled = false;
    if(btn.dataset.oldText) btn.textContent = btn.dataset.oldText;
  }
}

async function readyScan(code,method){
  const isScan = method !== "수기";
  const valid = validateLabelInput(code,isScan);
  if(!valid.ok)return toast(valid.msg,"err");
  code=valid.value;
  if(!scanGuard()) return; // 전체 스캔 1초 잠금
  const c=currentCenter(),wd=workingDay();
  const lockKey="ready:"+c+":"+wd+":"+code;
  if(!actionLock(lockKey)) return toast("저장 처리 중입니다. 잠시만 기다려주세요","warn");
  const btn=lockButton("저장 중...");
  try{
    if(readyOf(c).some(r=>r.code===code))return toast("이미 준비 등록된 라벨입니다 ("+code+")","err");
    const similarReady=findSimilarLabels(code,readyOf(c));
    if(similarReady.length && !confirmSimilarLabel(code,similarReady,"준비 등록")){
      toast("유사 라벨 확인 후 등록이 취소됐습니다","warn");
      return;
    }
    const tmpId="tmp_"+Date.now();
    const item={rowId:tmpId,center:c,code,dtype:S.dtype,wd,at:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),method:method||"스캔",synced:false,worker_account:USER.loginId};
    CACHE.ready=(CACHE.ready||[]).concat([item]);
    saveCache();
    if(scanner)await closeScanner();
    render();
    toast("준비 등록 ✓ "+code);
    const res=await gsPost({action:"addReady",data:{center_code:c,center_name:centerName(c),label_code:code,delivery_type:S.dtype,working_day:wd,scanned_at:item.at,input_method:item.method,worker_account:USER.loginId}});
    if(res&&res.ok){
      CACHE.ready=CACHE.ready.map(r=>r.rowId===tmpId?{...r,rowId:res.rowId,synced:true}:r);
      saveCache();
    }else if(res&&res.duplicate){
      CACHE.ready=CACHE.ready.filter(r=>r.rowId!==tmpId);
      saveCache();
      render();
      toast("이미 준비 등록된 라벨입니다","err");
    }else{
      CACHE.ready=CACHE.ready.filter(r=>r.rowId!==tmpId);
      saveCache();
      render();
      toast("시트 저장 실패 — 관리자에게 문의하세요","err");
    }
  }finally{
    actionUnlock(lockKey);
    unlockButton(btn);
  }
}

async function delReady(rowId,code){
  const c=currentCenter();
  const lockKey="delReady:"+rowId+":"+code;
  if(!actionLock(lockKey)) return toast("삭제 처리 중입니다. 잠시만 기다려주세요","warn");
  const btn=lockButton("확인 중...");
  try{
    if(!confirm(`라벨 [${code}]을 삭제하겠습니까?
삭제 후 복구가 어렵습니다.`))return;

    if(btn) btn.textContent="삭제 중...";

    // 삭제 확정 후 최신 상차 상태를 1회만 재조회합니다.
    // 기존 버전처럼 확인창 전에 비동기 재조회가 들어가면 일부 브라우저/현장 단말에서
    // 확인창이 반복되는 것처럼 보일 수 있어, 확인 이후로 순서를 변경했습니다.
    if(rowId&&!String(rowId).startsWith("tmp_")){
      try{await loadData(c);}catch(e){}
    }

    const loadedCodes=new Set(loadedOf(c).map(x=>String(x.code)));
    if(loadedCodes.has(String(code))){
      toast("상차 완료된 파렛트는 삭제할 수 없습니다. 마스터에게 문의하세요.","err");
      render();
      return;
    }

    if(rowId&&!String(rowId).startsWith("tmp_")){
      const res=await gsPost({
        action:"deleteReady",
        rowId:rowId,
        center_code:c,
        label_code:code,
        working_day:workingDay()
      });
      if(!(res&&res.ok)){
        const msg=(res&&res.msg)||((res&&res.error)?("서버 오류: "+res.error):"삭제 실패 — Apps Script 최신본 적용 여부를 확인하세요");
        toast(msg,"err");
        try{await loadData(c);}catch(e){}
        render();
        return;
      }
    }

    CACHE.ready=(CACHE.ready||[]).filter(r=>r.rowId!==rowId);
    saveCache();
    render();
    toast("삭제했습니다");
  }finally{
    actionUnlock(lockKey);
    unlockButton(btn);
  }
}

async function loadScan(code,method){
  const isScan = method !== "수기";
  const valid = validateLabelInput(code,isScan);
  if(!valid.ok)return toast(valid.msg,"err");
  code=valid.value;
  if(!scanGuard()) return;
  if(!S.session)return toast("먼저 [상차 시작]을 눌러 세션을 시작하세요","err");
  const c=currentCenter();
  if(loadedOf(c).some(r=>r.code===code)||S.session.buffer.some(b=>b.code===code))return toast("이미 상차된 라벨입니다 ("+code+")","err");
  const similarLoad=findSimilarLabels(code,loadedOf(c).concat(S.session.buffer||[]));
  if(similarLoad.length && !confirmSimilarLabel(code,similarLoad,"상차 등록")){
    toast("유사 라벨 확인 후 상차가 취소됐습니다","warn");
    return;
  }
  const similarReady=findSimilarLabels(code,readyOf(c));
  if(similarReady.length && !confirmSimilarLabel(code,similarReady,"상차 진행")){
    toast("유사한 준비등록 라벨 확인 후 상차가 취소됐습니다","warn");
    return;
  }
  const ready=readyOf(c).find(r=>r.code===code),viol=!ready;
  const newDtype=ready?ready.dtype:"-";

  // ── 혼합 적재 방지 ─────────────────────────────
  if(S.session.buffer.length>0 && newDtype!=="-"){
    const existDtypes=new Set(S.session.buffer.map(function(b){return b.dtype;}).filter(function(d){return d!=="-";}));
    if(existDtypes.size>0 && !existDtypes.has(newDtype)){
      const existName=[...existDtypes][0];
      const msg="⚠ 혼합 적재 불가\n\n이 트럭에는 ["+existName+"] 파렛트가 이미 실려 있습니다.\n["+newDtype+"] 파렛트를 함께 실을 수 없습니다.\n\n기존 "+S.session.buffer.length+"개를 하차(삭제)하고 이 파렛트로 교체하시겠습니까?";
      if(!confirm(msg)){
        toast("혼합 적재 불가 — 스캔이 취소됐습니다","err");
        if(scanner)await closeScanner();
        return;
      }
      S.session.buffer=[];
      toast("기존 파렛트를 하차했습니다. 새 파렛트를 등록합니다.","warn");
    }
  }
  // ────────────────────────────────────────────────

  S.session.buffer.unshift({code,dtype:newDtype,viol,method:method||"스캔"});
  if(scanner)await closeScanner();
  render();
  toast(viol?("준비 등록 없이 상차됩니다 ("+code+") — 기록됨"):("상차 스캔 ✓ "+code),viol?"warn":"");
}

async function completeLoad(){
  if(!S.session) return toast("진행 중인 상차 세션이 없습니다","err");
  if(!actionLock("completeLoad")) return toast("상차 완료 저장 중입니다. 잠시만 기다려주세요","warn");
  const btn=lockButton("저장 중...");
  try{
    const buffer=[...(S.session.buffer||[])];
    const n=buffer.length;
    if(!n)return toast("스캔된 파렛트가 없습니다","err");
    if(!confirm(`${n}개 상차가 맞습니까?
차량: ${S.session.vehicle||"미입력"}`))return;
    const c=S.session.center,wd=S.session.wd,t=fmtTime(kstNow()),sessionId="ses_"+Date.now();
    const vehicle=S.session.vehicle||"미입력";
    const startedAt=S.session.startedAt;
    const rows=buffer.map(function(b){return {
      center_code:c,center_name:centerName(c),label_code:b.code,delivery_type:normDtype(b.dtype),working_day:wd,session_id:sessionId,vehicle_no:vehicle,
      loading_started_at:startedAt,scanned_at:t,loading_completed_at:t,input_method:b.method,worker_account:USER.loginId
    };});

    // 화면 반응성을 위해 임시 캐시에 먼저 표시하되, 서버 실패 시 제거합니다.
    const tmpRows=buffer.map(function(b){return {rowId:"tmp_"+Date.now()+"_"+b.code,center:c,code:b.code,dtype:normDtype(b.dtype),wd,vehicle:vehicle,viol:b.viol,at:t,startAt:startedAt,completeAt:t,method:b.method,departed:false,synced:false,worker_account:USER.loginId};});
    CACHE.loading=(CACHE.loading||[]).concat(tmpRows);
    saveCache();

    let res=await gsPost({action:"addLoadingBatch",rows:rows});
    if(!(res&&res.ok)){
      // 구버전 Apps Script 대비 fallback: 1건씩 저장
      let okRows=[],fail=0;
      for(const row of rows){
        const r=await gsPost({action:"addLoading",data:row});
        if(r&&r.ok) okRows.push(r); else fail++;
      }
      res={ok:okRows.length>0,rows:okRows,fail_count:fail};
    }

    if(res&&res.ok){
      const returned=res.rows||[];
      const okByLabel={};
      returned.forEach(function(rr){if(rr&&rr.ok!==false&&rr.label_code) okByLabel[String(rr.label_code)]=rr;});
      CACHE.loading=(CACHE.loading||[]).map(function(r){
        const tmp=tmpRows.find(function(trow){return trow.rowId===r.rowId;});
        if(tmp){
          const rr=okByLabel[String(tmp.code)]||{};
          if(rr.rowId) return {...r,rowId:rr.rowId,synced:true,viol:rr.sequence_violation==="Y"};
          return {...r,synced:false};
        }
        return r;
      }).filter(function(r){
        const tmp=tmpRows.find(function(trow){return trow.rowId===r.rowId;});
        return !tmp || okByLabel[String(tmp.code)];
      });
      saveCache();
      S.lastCompletedVehicle=vehicle;S.lastCompletedCenter=c;
      const dtype=normDtype(buffer.find(function(b){return b.dtype&&b.dtype!=="-";})?.dtype||"전체");
      const rotation=findRotationForLoad(c,vehicle,dtype,t);
      S.session=null;
      render();
      const okCnt=returned.filter(function(x){return x&&x.ok!==false;}).length||n, failCnt=Number(res.fail_count||0);
      toast(failCnt?`${okCnt}개 저장, ${failCnt}개 실패`:`${okCnt}개 상차 완료 ✓`,failCnt?"warn":"");
      setTimeout(()=>{if(confirm("상차 완료 사진을 촬영하시겠습니까?\n차량: "+(vehicle||"미입력")+" · "+okCnt+"개 상차"))openPhotoCapture(c,vehicle,dtype,rotation);},500);
    }else{
      CACHE.loading=(CACHE.loading||[]).filter(function(r){return !tmpRows.some(function(trow){return trow.rowId===r.rowId;});});
      saveCache();
      render();
      toast("상차 저장 실패 — 네트워크/Apps Script를 확인하세요","err");
    }
  }finally{
    actionUnlock("completeLoad");
    unlockButton(btn);
  }
}

function funcLoadedStatus(){
  const c=currentCenter();
  const wd=workingDay();
  if(!c){document.getElementById("app").innerHTML=pageBackHtml()+"<h2>상차완료 리스트</h2><div class='note'>먼저 센터를 선택하세요.</div>";return;}

  // 상차완료 리스트는 현장 작업자가 사진 미업로드 건을 보러 들어오는 핵심 화면입니다.
  // 사진 API가 실패하거나 느려도 화면 진입 자체가 막히면 안 되므로,
  // 최초 진입 시 loading/photos를 1회만 불러오고 실패해도 리스트는 렌더링합니다.
  const loadKey=c+":"+wd;
  if(GS_URL && S.loadedStatusLoadingKey!==loadKey && S.loadedStatusLoadedKey!==loadKey){
    S.loadedStatusLoadingKey=loadKey;
    document.getElementById("app").innerHTML=pageBackHtml()+"<h2>상차완료 리스트</h2><div class='info'>상차완료 및 사진 상태를 불러오는 중...</div>";
    Promise.allSettled([loadData(c),loadPhotos(wd)]).then(function(){
      S.loadedStatusLoadedKey=loadKey;
      S.loadedStatusLoadingKey=null;
      if(NAV.func==="loadedstatus")funcLoadedStatus();
    });
    return;
  }

  const loaded=loadedOf(c);
  const day=loaded.filter(r=>r.dtype==="당일"),norm=loaded.filter(r=>r.dtype==="일반");
  const canDel=isMasterUser()||(role()==="load");

  // 차량번호는 시트에서 숫자로 들어올 수도 있으므로 String으로 통일합니다.
  const groups=buildVehicleRotations(loaded).map(function(g){
    return {...g, vehicle:String(g.vehicle||"미입력"), dtype:normDtype(g.dtype)};
  });
  groups.sort(function(a,b){
    return timeToMs((b.items[b.items.length-1]||{}).at)-timeToMs((a.items[a.items.length-1]||{}).at);
  });

  let listHtml="";
  if(groups.length===0){
    listHtml="<div class='empty'>아직 상차 완료된 파렛트가 없습니다.</div>";
  } else {
    groups.forEach(function(g){
      const sameVehicleCnt=groups.filter(x=>x.vehicle===g.vehicle).length;
      const rotLabel=g.rotation>1?` <span class='pill viol'>${g.rotation}회전</span>`:(sameVehicleCnt>1?" <span class='pill norm'>1회전</span>":"");
      const dayN=g.items.filter(x=>x.dtype==="당일").length;
      const normN=g.items.filter(x=>x.dtype==="일반").length;
      const photoCenter=c || g.center;
      const gid="vg_"+String(photoCenter)+"_"+String(g.vehicle).replace(/\s/g,"")+"_"+String(g.dtype).replace(/\s/g,"")+"_"+g.rotation;
      const expanded=S.expandedVehicle===gid;
      const pCount=photoCount(photoCenter,g.vehicle,g.dtype,g.rotation);
      const photoNotice=pCount>0
        ? `<div class="meta" style="color:var(--gd);font-weight:900">사진 ${pCount}장 업로드 완료</div>`
        : `<div class="meta" style="color:var(--red);font-weight:900">사진 미업로드 — 우측 [사진 업로드 필요] 버튼으로 업로드하세요</div>`;

      listHtml+=`<div class='card' style='margin-bottom:10px;padding:0;overflow:hidden'>`;
      listHtml+=`<div style='padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px'>`;
      listHtml+=`<div style='min-width:0'>`;
      listHtml+=`<div style='font-size:20px;font-weight:900;color:var(--gd)'>차량 ${escapeHtml(g.vehicle)}${rotLabel}</div>`;
      listHtml+=`<div style='margin-top:4px;font-size:13px;color:var(--gray)'>`;
      if(dayN>0) listHtml+=`<span style='color:var(--pinktxt);font-weight:700'>당일 ${dayN} PLT</span>`;
      if(dayN>0&&normN>0) listHtml+=` · `;
      if(normN>0) listHtml+=`<span style='color:#7A5B00;font-weight:700'>일반 ${normN} PLT</span>`;
      if(dayN===0&&normN===0) listHtml+=`${g.items.length} PLT`;
      listHtml+=` · ${escapeHtml(g.dtype)} · ${escapeHtml(centerName(g.center))}</div>${photoNotice}</div>`;
      listHtml+=`<div style='display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end'>`+
        `${photoBadgeHtml(photoCenter,g.vehicle,g.dtype,g.rotation)}`+
        `${photoButtonHtml(photoCenter,g.vehicle,g.dtype,g.rotation)}`+
        `<span onclick="S.expandedVehicle=S.expandedVehicle==='${gid}'?null:'${gid}';funcLoadedStatus()" style='font-size:20px;color:var(--gray);cursor:pointer'>${expanded?"▲":"▼"}</span>`+
        `</div>`;

function timeToMs(t){
  if(!t) return 0;
  var s=displayTime(t);
  var isPm=s.indexOf("오후")>=0;
  var isAm=s.indexOf("오전")>=0;
  s=s.replace("오전","").replace("오후","").trim();
  var parts=s.split(":");
  if(parts.length<2) return 0;
  var h=parseInt(parts[0],10)||0,m=parseInt(parts[1],10)||0,sec=parseInt(parts[2],10)||0;
  if(isPm && h<12) h+=12;
  if(isAm && h===12) h=0;
  // 워킹데이 기준 07:00~익일 06:59이므로 새벽 시간은 다음날로 보정합니다.
  var dayOffset = h<7 ? 24*60*60*1000 : 0;
  return dayOffset + ((h*60+m)*60+sec)*1000;
}
function buildVehicleRotations(items){
  const TWO_HOURS=2*60*60*1000;
  const groups=[];
  const sorted=[...(items||[])].sort((a,b)=>timeToMs(a.at)-timeToMs(b.at));
  sorted.forEach(function(item){
    const vno=String(item.vehicle||"미입력").trim()||"미입력";
    const cCode=String(item.center||"").trim();
    const dtype=normDtype(item.dtype);
    const itemMs=timeToMs(item.at);
    let matched=null;
    for(let i=groups.length-1;i>=0;i--){
      // 회전 판단은 센터를 제외하고 워킹데이·차량번호·배송유형·2시간 기준으로 계산합니다.
      if(groups[i].vehicle===vno&&groups[i].dtype===dtype){
        const lastMs=timeToMs(groups[i].items[groups[i].items.length-1].at);
        if(itemMs-lastMs<=TWO_HOURS){matched=groups[i];break;}
      }
    }
    if(!matched){
      const countSame=groups.filter(g=>g.vehicle===vno&&g.dtype===dtype).length;
      matched={vehicle:vno,center:cCode,dtype:dtype,rotation:countSame+1,items:[],centers:{}};
      groups.push(matched);
    }
    item.rotation=matched.rotation;
    matched.items.push(item);
    matched.centers[cCode]=true;
  });
  return groups;
}
function findRotationForLoad(center,vehicle,dtype,at){
  const items=(CACHE.loading||[]).filter(function(r){return r.wd===workingDay()&&String(r.vehicle||"미입력")===String(vehicle||"미입력")&&normDtype(r.dtype)===normDtype(dtype)&&!isDeletedFlag(r.deleted);});
  const groups=buildVehicleRotations(items);
  const targetMs=timeToMs(at);
  for(const g of groups){
    if(g.items.some(function(x){return timeToMs(x.at)===targetMs;})) return g.rotation;
  }
  return groups.length?groups[groups.length-1].rotation:1;
}

async function handlePhotoSelected(input){
  const file = input.files && input.files[0];

  const ctx = S.photoCtx;

function deleteQueuedPhoto(i){
  const ctx=S.photoCtx;
  if(!ctx||!ctx.photos[i]) return;
  if(ctx.photos[i].status==="uploaded") return toast("이미 업로드된 사진은 화면에서 삭제할 수 없습니다","warn");
  ctx.photos.splice(i,1);
  renderPhotoCapture();
}

async function uploadQueuedPhotos(){
  const ctx=S.photoCtx;
  if(!ctx) return;
  const targets=ctx.photos.filter(p=>p.status==="pending"||p.status==="failed");
  if(!targets.length) return toast("업로드할 사진이 없습니다","warn");
  if(!GS_URL) return toast("구글 시트 미연결 — 사진 저장 불가", "err");
  if(!actionLock("uploadQueuedPhotos")) return toast("사진 업로드 중입니다. 잠시만 기다려주세요","warn");
  ctx.uploading=true;
  renderPhotoCapture();
  const statusEl = document.getElementById("photoUploadStatus");
  let ok=0, fail=0;
  try{
    for(let i=0;i<targets.length;i++){
      const p=targets[i];
      if(statusEl) statusEl.innerHTML = `<div class='info'>업로드 중... (${i+1}/${targets.length})</div>`;
      p.status="uploading";
      const capturedAt=kstNow();
      const stamp=pad2(capturedAt.getHours())+pad2(capturedAt.getMinutes())+pad2(capturedAt.getSeconds());
      const res = await gsPost({
        action:      "uploadPhoto",
        center:      ctx.center,
        vehicle:     ctx.vehicle,
        dtype:       normDtype(ctx.dtype),
        rotation:    ctx.rotation,
        seq:         p.seq,
        working_day: workingDay(),
        data:        p.data,
        uploaded_by: USER&&USER.loginId || "",
        captured_at: stamp
      });
      if(res && res.ok){
        ok++;
        p.status="uploaded";
        p.filename=res.filename;
        p.data="";
        p.error="";
        p.share_warning=res.share_warning||"";
        CACHE.photos=(CACHE.photos||[]).concat([{
          photo_id:res.photo_id,center:ctx.center,wd:workingDay(),vehicle:ctx.vehicle,dtype:normDtype(ctx.dtype),rotation:ctx.rotation,seq:p.seq,filename:res.filename,url:res.url,file_id:res.fileId,share_warning:res.share_warning||"",uploaded_at:kstNow().toLocaleString("ko-KR"),deleted:""
        }]);
        CACHE.photosLoadedDay=workingDay();
        S.loadedStatusLoadedKey=null;
        saveCache();
      }else{
        fail++;
        p.status="failed";
        p.error=(res&&(res.msg||res.error))||"오류";
      }
    }
  }finally{
    ctx.uploading=false;
    actionUnlock("uploadQueuedPhotos");
  }
  renderPhotoCapture();
  toast(fail?`${ok}장 업로드, ${fail}장 실패`:`${ok}장 사진 업로드 완료 ✓`,fail?"warn":"");
}

function finishPhotoCapture(){
  const ctx=S.photoCtx;
  if(ctx){
    const remain=ctx.photos.filter(p=>p.status==="pending"||p.status==="failed").length;
    const uploaded=ctx.photos.filter(p=>p.status==="uploaded").length;
    if(remain>0 && !confirm("아직 업로드되지 않은 사진 "+remain+"장이 있습니다. 닫을까요?")) return;
    S.photoCtx = null;
    if(uploaded > 0){ S.loadedStatusLoadedKey=null; toast(uploaded+"장 사진 업로드 완료 ✓"); }
  }
  render();
}

function resizeImage(file, maxW, maxH, quality){
  return new Promise(function(resolve){
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w > maxW || h > maxH){
          const ratio = Math.min(maxW/w, maxH/h);
          w = Math.round(w*ratio); h = Math.round(h*ratio);
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function funcPrevPending(){
  const wd=prevWorkingDay();
  const summary=(CACHE.prevPendingSummary&&CACHE.prevPendingSummary.working_day===wd)?CACHE.prevPendingSummary:null;
  let rows=[];
  let tDay=0,tNorm=0,tTotal=0;

  if(summary){
    rows=(summary.rows||[]).map(function(r){
      const code=String(r.center_code||r.code||"").trim();
      return {
        code:code,
        name:r.center_name||centerName(code),
        day:Number(r.day_count||r.day||0),
        norm:Number(r.norm_count||r.norm||0),
        total:Number(r.total_count||r.total||0)
      };
    });
    tDay=Number(summary.total_day||rows.reduce(function(s,r){return s+r.day;},0));
    tNorm=Number(summary.total_norm||rows.reduce(function(s,r){return s+r.norm;},0));
    tTotal=Number(summary.total||rows.reduce(function(s,r){return s+r.total;},0));
  }else{
    const hasAny=(CACHE.ready||[]).some(function(r){return normalizeDateForApp(r.wd)===wd;});
    if(GS_URL&&!hasAny){refreshPrevPending();return;}
    rows=GROUPS.flatMap(function(g){return g.floors.map(function(arr){
      const code=arr[0],fl=arr[1];
      const pend=pendingOfDay(code,wd);
      const day=pend.filter(function(r){return r.dtype==="당일";}).length;
      const norm=pend.filter(function(r){return r.dtype==="일반";}).length;
      return{code:code,name:g.name+" "+fl,day:day,norm:norm,total:day+norm};
    });});
    tDay=rows.reduce(function(s,r){return s+r.day;},0);

    "<td style='padding:8px;text-align:center;font-weight:900;color:"+(r.day>0?"var(--pinktxt)":"var(--gray)")+"'>"+r.day+"</td>"+
    "<td style='padding:8px;text-align:center;font-weight:900;color:"+(r.norm>0?"#7A5B00":"var(--gray)")+"'>"+r.norm+"</td>"+
    "<td style='padding:8px;text-align:center;font-weight:900;color:"+(r.total>0?"var(--red)":"var(--gray)")+"'>"+r.total+" PLT</td>"+
    "</tr>";});
  trs+="<tr style='background:var(--tint2);border-top:2px solid var(--g)'><td style='padding:8px 10px;font-weight:900'>합계</td><td style='padding:8px;text-align:center;font-weight:900'>"+tDay+"</td><td style='padding:8px;text-align:center;font-weight:900'>"+tNorm+"</td><td style='padding:8px;text-align:center;font-weight:900;color:"+(tTotal>0?"var(--red)":"var(--gray)")+"'>"+tTotal+" PLT</td></tr>";
  document.getElementById("app").innerHTML=pageBackHtml()+"<h2>전일 미상차 현황</h2>"+
    "<button class='btn ghost' style='margin-bottom:10px;font-size:14px;min-height:44px' onclick='refreshPrevPending()'>&#128260; 새로고침</button>"+
    (summary&&summary.loadedAt?"<div class='info'>마지막 조회 "+summary.loadedAt+"</div>":"")+
    "<div class='info'>전일 워킹데이 "+wd+"에 준비등록됐지만 아직 상차 완료되지 않은 잔량입니다.</div>"+
    "<div class='kpi' style='grid-template-columns:1fr 1fr 1fr;margin-bottom:12px'><div class='"+(tDay>0?"pink":"")+"'><div class='n'>"+tDay+"</div><div class='l'>전일 당일</div></div><div style='"+(tNorm>0?"background:#FFF8E1;border:1px solid #E6C36A":"")+"'><div class='n' style='"+(tNorm>0?"color:#7A5B00":"")+"'>"+tNorm+"</div><div class='l'>전일 일반</div></div><div style='"+(tTotal>0?"background:var(--redbg);border:1px solid var(--red)":"")+"'><div class='n' style='"+(tTotal>0?"color:var(--red)":"")+"'>"+tTotal+"</div><div class='l'>합계</div></div></div>"+
    "<div style='overflow-x:auto'><table style='width:100%;border-collapse:collapse;font-size:13px'><thead><tr style='background:var(--g);color:#fff'><th style='padding:8px 10px;text-align:left'>센터</th><th style='padding:8px;text-align:center'>당일</th><th style='padding:8px;text-align:center'>일반</th><th style='padding:8px;text-align:center'>합계</th></tr></thead><tbody>"+trs+"</tbody></table></div>";

async function saveReservationFromForm(){
  if(!isMasterUser()) return toast("배정예약은 마스터만 등록할 수 있습니다","err");
  if(!actionLock("saveReservation")) return toast("예약 저장 중입니다. 잠시만 기다려주세요","warn");
  const btn=lockButton("저장 중...");
  try{
    const veh=(document.getElementById('resVeh')?.value||'').trim();
    const dtype=document.getElementById('resType')?.value||'일반';
    const memo=(document.getElementById('resMemo')?.value||'').trim();
    if(!veh) return toast("차량번호를 입력하세요","err");
    const centers=[];GROUPS.forEach(function(g){g.floors.forEach(function(arr){var code=arr[0];var el=document.getElementById('res_'+code);var n=Number(el&&el.value||0);if(n>0) centers.push({center_code:code,reserved_plt:n});});});
    if(!centers.length) return toast("1개 이상 센터에 예약 PLT를 입력하세요","err");
    const overList=centers.map(function(x){
      const pending=dashboardPendingFor(x.center_code,dtype);
      const over=overReservationCount(pending,x.reserved_plt);
      return {center_code:x.center_code,pending:pending,reserved:x.reserved_plt,over:over};
    }).filter(function(x){return x.over>0;});
    if(overList.length){
      const lines=overList.map(function(x){return '- '+centerName(x.center_code)+': 준비 '+x.pending+' PLT / 예약 '+x.reserved+' PLT / 초과 '+x.over+' PLT';}).join('\n');
      const msg='⚠ 현재 준비완료 잔량보다 예약 PLT가 많습니다.\n\n'+lines+'\n\n곧 출고장에서 준비등록될 물량을 포함한 예약이라면 그대로 등록하세요.\n그래도 등록하시겠습니까?';
      if(!confirm(msg)){toast('초과예약 확인 후 등록이 취소됐습니다','warn');return;}
    }
    const res=await gsPost({action:'saveReservation',data:{reserve_group_id:S.editReservationGroupId||'',working_day:workingDay(),vehicle_no:veh,delivery_type:dtype,memo:memo,centers:centers,created_by:USER.loginId}});
    if(res&&res.ok){toast(S.editReservationGroupId?"예약 수정 완료":"예약 등록 완료");S.editReservationGroupId=null;await Promise.all([loadReservations(workingDay()),loadReservationSummary(workingDay())]);funcReservation();}
    else toast((res&&res.msg)||"예약 저장 실패 — Apps Script 최신본을 확인하세요","err");
  }finally{actionUnlock("saveReservation");unlockButton(btn);}
}
function editReservation(groupId){S.editReservationGroupId=groupId;funcReservation();}
async function cancelReservation(groupId){

}
function funcDash(){
  if(GS_URL&&(!CACHE.dashboard||CACHE.dashboard.working_day!==workingDay()||!CACHE.reservationSummary||CACHE.reservationSummary.working_day!==workingDay())){
    refreshDash();
    return;
  }
  var dashRows=(CACHE.dashboard&&CACHE.dashboard.working_day===workingDay()&&CACHE.dashboard.rows)||dashboardRowsFallback();
  const rows=GROUPS.flatMap(function(g){
    return g.floors.map(function(arr){
      const code=arr[0],fl=arr[1];
      const d=dashRows.find(function(x){return String(x.center_code||x.code)===String(code);})||dashboardRowFor(code);
      const res=reservationSummaryRow(code);
      const pendDay=Number(d.pending_day_count||0), pendNorm=Number(d.pending_norm_count||0);
      const loadedDay=Number(d.loaded_day_count||0), loadedNorm=Number(d.loaded_norm_count||0);
      const reserved=Number(res.reserved_remaining_count||0);
      const reservedDay=Number(res.reserved_day_remaining_count||0), reservedNorm=Number(res.reserved_norm_remaining_count||0);
      const pend=pendDay+pendNorm;
      return{code:code,name:g.name+" "+fl,pend:pend,loaded:loadedDay+loadedNorm,pendDay:pendDay,pendNorm:pendNorm,loadedDay:loadedDay,loadedNorm:loadedNorm,reserved:reserved,reservedDay:reservedDay,reservedNorm:reservedNorm,unassigned:Math.max(pend-reserved,0),overReserved:overReservationCount(pend,reserved)};
    });
  });
  const tDayPend=rows.reduce(function(s,r){return s+r.pendDay;},0);
  const tNormPend=rows.reduce(function(s,r){return s+r.pendNorm;},0);
  const tReserved=rows.reduce(function(s,r){return s+r.reserved;},0);
  const tUnassigned=rows.reduce(function(s,r){return s+r.unassigned;},0);
  const tOverReserved=rows.reduce(function(s,r){return s+r.overReserved;},0);
  const tDayLoad=rows.reduce(function(s,r){return s+r.loadedDay;},0);
  const tNormLoad=rows.reduce(function(s,r){return s+r.loadedNorm;},0);

  function tdDash(val,cls,unit){
    const n=Number(val||0);
    return "<td class='dashNum "+cls+(n>0?" hasVal":"")+"'>"+n+" "+(unit!==false?"<span>PLT</span>":"")+"</td>";
  }
  function totalTd(val,cls,unit){
    const n=Number(val||0);
    return "<td class='dashTotal "+cls+(n>0?" hasVal":"")+"'>"+n+" "+(unit!==false?"<span>PLT</span>":"")+"</td>";
  }

  var tableRows="";
  var prevGroup="";
  rows.forEach(function(r){
    var gname=r.name.replace(/\s(\S+)$/,"").trim();
    if(prevGroup&&prevGroup!==gname){tableRows+="<tr class='dashGroupGap'><td colspan='8'></td></tr>";}
    prevGroup=gname;
    tableRows+=
      "<tr class='dashRow'>"+
      "<td class='dashCenter'>"+r.name+" <span>("+r.code+")</span></td>"+
      tdDash(r.pendDay,"readyDay")+
      tdDash(r.pendNorm,"readyNorm groupEnd")+
      tdDash(r.reserved,"reserved")+
      tdDash(r.unassigned,"unassigned")+
      tdDash(r.overReserved,"overReserved groupEnd")+
      tdDash(r.loadedDay,"loaded",false)+
      tdDash(r.loadedNorm,"loaded",false)+
      "</tr>";
  });
  tableRows+=
    "<tr class='dashSumRow'>"+
    "<td class='dashCenter'>합계</td>"+
    totalTd(tDayPend,"readyDay")+
    totalTd(tNormPend,"readyNorm groupEnd")+
    totalTd(tReserved,"reserved")+
    totalTd(tUnassigned,"unassigned")+
    totalTd(tOverReserved,"overReserved groupEnd")+
    totalTd(tDayLoad,"loaded",false)+
    totalTd(tNormLoad,"loaded",false)+
    "</tr>";

  const dashBackHtml=(isMasterUser()&&NAV.screen==="masterdash")?"":pageBackHtml();
  document.getElementById("app").innerHTML=
    dashBackHtml+
    "<h2>전체 센터 현황표</h2>"+
    "<div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:10px'>"+
    "<button class='btn ghost' style='font-size:14px;min-height:44px;padding:10px' onclick=\"goFunc('reservation')\">배정예약 관리</button>"+
    "<button class='btn ghost' style='font-size:14px;min-height:44px;padding:10px' onclick=\"goFunc('prevpending')\">전일 미상차</button>"+
    "<button class='btn ghost' style='font-size:14px;min-height:44px;padding:10px' onclick=\"goFunc('vehicles')\">차량별 상차 현황</button>"+
    "<button class='btn ghost' style='font-size:14px;min-height:44px;padding:10px' onclick=\"goFunc('depart')\">상차내역</button>"+
    "<button class='btn ghost' style='font-size:14px;min-height:44px;padding:10px' onclick=\"goFunc('accounts')\">계정 관리</button>"+
    "</div>"+
    "<button class='btn ghost' style='margin-bottom:10px;font-size:14px;min-height:44px' onclick='refreshDash()'>&#128260; 새로고침</button>"+
    "<div class='info'>현재 물량은 <b>준비완료 잔량</b>, 배차 판단은 <b>예약 관리</b>, 처리 결과는 <b>상차 완료</b> 영역으로 나눠 표시합니다.</div>"+
    (S.session?"<div class='note'>⚠ 세션 미마감: "+centerName(S.session.center)+" 차량 "+(S.session.vehicle||"미입력")+" ("+S.session.buffer.length+"개)</div>":"")+
    "<div class='kpi' style='grid-template-columns:1fr 1fr;margin-bottom:12px'>"+
      "<div class='"+(tDayPend>0?"pink":"")+"'><div class='n'>"+tDayPend+" <span style='font-size:14px;font-weight:400'>PLT</span></div><div class='l'>당일 잔량</div></div>"+
      "<div style='"+(tReserved>0?"background:var(--tint);border:1px solid var(--tint2)":"")+"'><div class='n'>"+tReserved+" <span style='font-size:14px;font-weight:400'>PLT</span></div><div class='l'>배정예약 잔량</div></div>"+
      "<div style='"+(tUnassigned>0?"background:var(--redbg);border:1px solid var(--red)":"")+"'><div class='n' style='"+(tUnassigned>0?"color:var(--red)":"")+"'>"+tUnassigned+" <span style='font-size:14px;font-weight:400'>PLT</span></div><div class='l' style='"+(tUnassigned>0?"color:var(--red)":"")+"'>미배정 잔량</div></div>"+
      "<div style='"+(tOverReserved>0?"background:#FFF8E1;border:1px solid var(--yellowbd)":"")+"'><div class='n' style='"+(tOverReserved>0?"color:#B8860B":"")+"'>"+tOverReserved+" <span style='font-size:14px;font-weight:400'>PLT</span></div><div class='l' style='"+(tOverReserved>0?"color:#B8860B":"")+"'>초과예약</div></div>"+
    "</div>"+
    "<div class='dashTableWrap'><table class='dashTable'>"+
      "<colgroup><col class='colCenter'><col class='colMetric'><col class='colMetric'><col class='colMetric'><col class='colMetric'><col class='colMetric'><col class='colMetric'><col class='colMetric'></colgroup>"+
      "<thead>"+
        "<tr class='dashGroupHead'>"+
          "<th rowspan='2' class='dashCenterHead'>센터</th>"+
          "<th colspan='2' class='readyGroup'>준비완료 잔량</th>"+
          "<th colspan='3' class='reserveGroup'>예약 관리</th>"+
          "<th colspan='2' class='doneGroup'>상차 완료</th>"+
        "</tr>"+
        "<tr class='dashSubHead'>"+
          "<th class='readyDay'>당일<br>잔량</th>"+
          "<th class='readyNorm groupEnd'>일반<br>잔량</th>"+
          "<th class='reserved'>예약<br>잔량</th>"+
          "<th class='unassigned'>미배정<br>잔량</th>"+
          "<th class='overReserved groupEnd'>초과<br>예약</th>"+
          "<th class='loaded'>당일<br>완료</th>"+
          "<th class='loaded'>일반<br>완료</th>"+
        "</tr>"+
      "</thead><tbody>"+tableRows+"</tbody></table></div>"+
    "<div class='dashLegend'>"+
      "<span class='lg ready'>준비완료 잔량</span>"+
      "<span class='lg reserve'>예약 관리</span>"+
      "<span class='lg done'>상차 완료</span>"+

      "<span class='lg'>단위: PLT</span>"+
    "</div>";
}
function departRowsFallback(){
  const wd=workingDay();
  if(isMasterUser()&&!currentCenter()){
    return GROUPS.flatMap(function(g){return g.floors.flatMap(function(arr){return loadedOf(arr[0]);});}).filter(function(r){return normalizeDateForApp(r.wd)===wd&&!isDeletedFlag(r.deleted);});
  }
  const c=currentCenter();
  return loadedOf(c).filter(function(r){return normalizeDateForApp(r.wd)===wd&&!isDeletedFlag(r.deleted);});
}
function applyDepartFilter(){
  S.departVehicleFilter=(document.getElementById("departVehicleSearch")?.value||"").trim();
  S.departCenterFilter=(document.getElementById("departCenterFilter")?.value||"").trim();
  funcDepart();
}
function resetDepartFilter(){
  S.departVehicleFilter="";
  S.departCenterFilter="";
  funcDepart();
}
function funcDepart(){
  const wd=workingDay();
  if(GS_URL&&(!CACHE.loadHistory||CACHE.loadHistory.working_day!==wd)){
    document.getElementById("app").innerHTML=pageBackHtml()+"<h2>상차내역</h2><div class='info'>상차 라벨 상세 데이터를 불러오는 중...</div>";
    loadLoadHistory(wd).then(funcDepart);
    return;
  }
  let rows=[];
  if(CACHE.loadHistory&&CACHE.loadHistory.working_day===wd&&!CACHE.loadHistory.failed){
    rows=(CACHE.loadHistory.rows||[]).slice();
  } else {
    rows=departRowsFallback();
  }
  const fixedCenter=(!isMasterUser()||currentCenter())?currentCenter():"";
  const centerFilter=fixedCenter || (S.departCenterFilter||"");
  const vehicleFilter=String(S.departVehicleFilter||"").trim().toLowerCase();
  if(centerFilter) rows=rows.filter(function(r){return String(r.center||r.center_code)===String(centerFilter);});
  if(vehicleFilter) rows=rows.filter(function(r){return String(r.vehicle||r.vehicle_no||"").toLowerCase().includes(vehicleFilter);});
  rows=rows.slice().sort(function(a,b){
    const av=String(a.vehicle||a.vehicle_no||"").localeCompare(String(b.vehicle||b.vehicle_no||""));
    if(av!==0) return av;
    const ac=String(a.center||a.center_code||"").localeCompare(String(b.center||b.center_code||""));
    if(ac!==0) return ac;
    return timeToMs(a.at||a.scanned_at)-timeToMs(b.at||b.scanned_at);
  });
  let h=pageBackHtml()+`<h2>상차내역</h2><div class="info">${isMasterUser()&&!fixedCenter?"전 센터 기준으로":""} 어떤 차량에 어떤 라벨(파렛트)이 상차되었는지 조회하는 화면입니다. 출차 처리는 사용하지 않고 조회 전용으로 운영합니다.</div>`;
  if(isMasterUser()&&!fixedCenter){
    h+=`<div class="card"><div style="font-weight:900;margin-bottom:10px">조회 필터</div>
      <div class="row"><div><label>차량번호 검색</label><input id="departVehicleSearch" value="${escapeHtml(S.departVehicleFilter||"")}" placeholder="예: 1234" onkeydown="if(event.key==='Enter')applyDepartFilter()"></div>
      <div><label>센터</label><select class="formsel" id="departCenterFilter">${centerOptions(S.departCenterFilter||"",true)}</select></div></div>
      <div class="row"><button class="btn" onclick="applyDepartFilter()">조회</button><button class="btn ghost" onclick="resetDepartFilter()">초기화</button><button class="btn ghost" onclick="CACHE.loadHistory=null;funcDepart()">새로고침</button></div></div>`;
  } else {
    h+=`<div class="info">센터: <b>${centerName(fixedCenter)}</b></div>`;
  }
  if(CACHE.loadHistory&&CACHE.loadHistory.failed) h+="<div class='note'>서버 상차내역 조회에 실패해 현재 캐시 기준으로 표시합니다.</div>";
  if(!rows.length){
    document.getElementById("app").innerHTML=h+"<div class='empty'>조건에 맞는 상차 라벨이 없습니다.</div>";
    return;
  }
  h+=`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:12px 14px;border-bottom:1px solid var(--line)"><b>상차 라벨 상세</b><div class="meta">차량번호·회차·센터·배송유형·라벨번호·상차시간 기준 상세 내역입니다.</div></div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:980px">
        <thead><tr style="background:#F8FAFC;color:var(--gray)">
          <th style="padding:9px 8px;text-align:left;white-space:nowrap">차량번호</th>
          <th style="padding:9px 8px;text-align:center;white-space:nowrap">회차</th>
          <th style="padding:9px 8px;text-align:center;white-space:nowrap">센터</th>
          <th style="padding:9px 8px;text-align:center;white-space:nowrap">배송유형</th>
          <th style="padding:9px 8px;text-align:left;white-space:nowrap">라벨(파렛트)</th>
          <th style="padding:9px 8px;text-align:center;white-space:nowrap">상차 시작</th>
          <th style="padding:9px 8px;text-align:center;white-space:nowrap">최종 상차</th>
          <th style="padding:9px 8px;text-align:center;white-space:nowrap">작업자</th>
          <th style="padding:9px 8px;text-align:center;white-space:nowrap">상태</th>
        </tr></thead><tbody>`;
  rows.forEach(function(l){
    const dtype=normDtype(l.dtype||l.delivery_type);
    const status=(l.viol||String(l.sequence_violation||"").trim().toUpperCase()==="Y")?"준비누락":"정상";
    h+=`<tr style="border-top:1px solid var(--line)">
      <td style="padding:10px 8px;font-weight:900;white-space:nowrap">${escapeHtml(l.vehicle||l.vehicle_no||"미입력")}</td>
      <td style="padding:10px 8px;text-align:center;white-space:nowrap">${escapeHtml(l.rotation||"")}</td>
      <td style="padding:10px 8px;text-align:center;white-space:nowrap">${centerName(l.center||l.center_code)}</td>
      <td style="padding:10px 8px;text-align:center;white-space:nowrap"><span class="pill ${dtypePillClass(dtype)}">${escapeHtml(displayDtype(dtype))}</span></td>
      <td style="padding:10px 8px;white-space:nowrap">${labelView(l.code||l.label_code,"",l.method||l.input_method)}</td>
      <td style="padding:10px 8px;text-align:center;white-space:nowrap;color:var(--gray)">${escapeHtml(displayTime(l.startAt||l.loading_started_at||""))}</td>
      <td style="padding:10px 8px;text-align:center;white-space:nowrap;color:var(--gray)">${escapeHtml(displayTime(l.completeAt||l.loading_completed_at||l.at||l.scanned_at||""))}</td>
      <td style="padding:10px 8px;text-align:center;white-space:nowrap;color:var(--gray)">${escapeHtml(l.worker_account||l.worker||"")}</td>
      <td style="padding:10px 8px;text-align:center;white-space:nowrap">${status==="준비누락"?"<span class='pill viol'>준비누락</span>":"<span class='pill day'>정상</span>"}</td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById("app").innerHTML=h;
}

function funcAccounts(){
  if(GS_URL&&!(CACHE.accounts||[]).length){loadAccounts().then(funcAccounts);return;}
  const accs=CACHE.accounts||[];
  const editing=S.editAccountId?accs.find(function(a){return (a.id||a.account_id)===S.editAccountId;}):null;

  // 추가/수정 폼
  var formTitle=editing?"계정 수정 — "+editing.name:"계정 추가";
  var formHtml="<div class='card' style='"+(editing?"border:2px solid var(--g)":"")+"'>";
  formHtml+="<div style='font-weight:800;font-size:16px;margin-bottom:12px;"+(editing?"color:var(--gd)":"")+"'>"+formTitle+"</div>";
  if(!editing){
    formHtml+="<div class='info' style='margin-bottom:10px'>마스터 계정은 구글 시트 accounts 탭에서 직접 추가하세요.</div>";
  }
  formHtml+="<label>이름</label><input type='text' id='accName' value='"+(editing?editing.name||"":"")+"' placeholder='예: 홍길동'/>";
  formHtml+="<label>로그인ID</label><input type='text' id='accLogin' value='"+(editing?(editing.loginId||editing.login_id||""):"")+"' placeholder='예: out01'/>";
  formHtml+="<label>비밀번호"+(editing?" (변경 시에만 입력)":"")+"</label><input type='password' id='accPw' placeholder='"+(editing?"변경하지 않으면 비워두세요":"신규 계정 비밀번호")+"'/>";
  formHtml+="<label>권한등급</label><select class='formsel' id='accRole' onchange='onAccRoleChange()'>";
  formHtml+="<option value='out'"+(editing&&editing.role==="out"?" selected":"")+">출고장</option>";
  formHtml+="<option value='load'"+(editing&&editing.role==="load"?" selected":"")+">상차장</option>";
  if(editing&&editing.role==="master"){
    formHtml+="<option value='master' selected>마스터</option>";
  }
  formHtml+="</select>";
  formHtml+="<label>부여센터</label><select class='formsel' id='accCenter' "+(editing&&editing.role==="master"?"disabled":"")+"'>"+centerOptions(editing?editing.center||editing.assigned_center||"YI01":"YI01",false)+"</select>";
  formHtml+="<div class='row2' style='margin-top:12px'>";
  formHtml+="<button class='btn' onclick='saveAccount()'>"+(editing?"수정 저장":"계정 추가")+"</button>";
  formHtml+="<button class='btn ghost' onclick='resetAccountForm()'>"+(editing?"취소":"초기화")+"</button>";
  formHtml+="</div></div>";

  // 계정 목록
  var listHtml=accs.length?
    "<ul class='list'>"+accs.map(function(a){
      var isMasterAcc=a.role==="master";
      return "<li class='li'><div style='flex:1'><b>"+a.name+"</b> "+
        "<span class='pill "+(a.active?"day":"off")+"'>"+(a.active?"활성":"비활성")+"</span>"+
        " <span class='pill norm'>"+(isMasterAcc?"마스터":a.role==="out"?"출고장":"상차장")+"</span>"+
        "<div class='meta'>ID "+(a.loginId||a.login_id)+" · "+(a.role==="master"?"전 센터":centerName(a.center||a.assigned_center))+"</div>"+
        "</div><div class='acctActions'>"+
        "<button class='miniBtn green' onclick='editAccount(\""+(a.id||a.account_id)+"\")'>수정</button>"+
        (isMasterAcc
          ?"<span style='font-size:11px;color:var(--gray);padding:4px'>시트에서 관리</span>"
          :"<button class='miniBtn' onclick='toggleAccount(\""+(a.id||a.account_id)+"\")'>"+(a.active?"비활성":"활성")+"</button>"+
           "<button class='miniBtn red' onclick='deleteAccount(\""+(a.id||a.account_id)+"\")'>삭제</button>"
        )+
        "</div></li>";
    }).join("")+"</ul>"
    :"<div class='empty'>등록된 계정이 없습니다.</div>";

  document.getElementById("app").innerHTML=
    pageBackHtml()+
    "<h2>계정 관리</h2>"+
    formHtml+
    "<div class='sub'>계정 목록 ("+accs.length+")</div>"+
    listHtml+
    "<button class='btn ghost' style='margin-top:10px' onclick='loadAccounts().then(funcAccounts)'>목록 새로고침</button>";
}

// ── 초기 실행 ──────────────────────────────────────────
render();
if(GS_URL){
  checkConnection();
  // 이미 로그인된 마스터 계정이면 대시보드 집계 API 1회 호출
  if(USER&&USER.role==="master"){
    if(NAV.screen==="masterdash") masterRefreshDash();
    else loadDashboard();
  } else if(USER&&USER.role!=="master"){
    // 작업자는 내 센터만 로드
    loadData(USER.center||"YI01");
  }
} else {
  const b=document.getElementById("gsBanner");
  if(b){b.className="gsBanner fail";b.textContent="구글 시트 미연결 — 마스터 로그인 후 설정에서 URL을 입력하세요";}
}
</script>
