<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#00855B">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FASSTO 스캔앱</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--g:#00855B;--gd:#005E3E;--slate:#333D4B;--gray:#6B7684;--bd:#E5E8EB;--tint:#F4FAF7;--tint2:#D9F0E5;--red:#C0392B;--redbg:#FFF5F5;--yellow:#FFF8E1;--yellowbd:#E6C36A;--pink:#FFE0EA;--pinkbd:#FF7FA4;--pinktxt:#A80036;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;background:#F7F9F8;color:var(--slate);font-size:16px;}
  header{background:var(--g);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:10;}
  .brand{font-weight:800;font-size:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .logoutBtn{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;}
  .wd{margin-top:6px;font-size:12px;color:#D6ECE2;}
  .mycenter{margin-top:8px;display:flex;flex-direction:column;gap:4px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:9px 10px;font-size:13px;line-height:1.45;}
  .mycenter b{font-size:14px;color:#fff;}
  .loginMeta{font-size:12px;color:#E4F5EE;}
  .gsBanner{padding:7px 14px;font-size:12px;font-weight:700;text-align:center;border-bottom:1px solid var(--bd);}
  .gsBanner.ok{background:#E8F5E9;color:#1B5E20;}.gsBanner.fail{background:var(--redbg);color:var(--red);}.gsBanner.loading{background:var(--yellow);color:#7A5B00;}
  main{padding:14px;max-width:560px;margin:0 auto;padding-bottom:40px;}
  h2{font-size:20px;margin:4px 0 14px;color:var(--slate);}
  .grouplabel{font-size:12px;font-weight:800;color:var(--g);margin:16px 0 8px;}
  .card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px;}
  .navrow{display:flex;align-items:center;background:#fff;border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;}
  .navrow.funcCard{padding:20px 16px;min-height:100px;border-radius:16px;box-shadow:0 4px 14px rgba(0,94,62,.08);}
  .navrow .blk{width:52px;height:52px;border-radius:12px;background:var(--g);color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex:0 0 52px;}
  .navrow .blk.dk{background:var(--gd);} .navrow .blk.gray{background:#6B7684;}
  .navrow.funcCard .blk{width:62px;height:62px;border-radius:16px;font-size:20px;flex-basis:62px;}
  .navrow .txt{flex:1;margin-left:12px;}.navrow .t{font-weight:800;font-size:16px;}.navrow.funcCard .t{font-size:20px;}.navrow .d{font-size:12.5px;color:var(--gray);margin-top:3px;}.navrow.funcCard .d{font-size:14px;margin-top:5px;}
  .navrow .badge{font-weight:800;color:var(--gd);font-size:16px;margin-right:8px;background:var(--tint);border:1px solid var(--tint2);border-radius:10px;padding:6px 10px;min-width:40px;text-align:center;}
  .navrow .chev{color:var(--gray);font-size:20px;}
  .btn{display:block;width:100%;padding:15px;border:none;border-radius:13px;font-size:17px;font-weight:800;color:#fff;background:var(--g);margin-bottom:10px;min-height:54px;}
  .btn.dk{background:var(--gd);} .btn.ghost{background:#fff;color:var(--g);border:2px solid var(--g);} .btn.danger{background:#fff;color:var(--red);border:2px solid var(--red);} .btn:disabled{opacity:.4;}
  .row2{display:flex;gap:8px;} .row2 .btn{flex:1;}
  input[type=text],select.formsel{width:100%;padding:13px;border:2px solid var(--bd);border-radius:10px;font-size:16px;background:#fff;min-height:52px;}
  label{display:block;font-size:12px;font-weight:800;color:var(--gray);margin:10px 0 5px;}
  .list{list-style:none;margin:0;padding:0;}.li{display:flex;align-items:center;justify-content:space-between;padding:13px 12px;border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;background:#fff;gap:8px;min-height:62px;}.code{font-family:Consolas,monospace;font-weight:700;font-size:16px;}.meta{font-size:12px;color:var(--gray);margin-top:3px;}
  .pill{font-size:12px;font-weight:700;padding:4px 9px;border-radius:20px;display:inline-block;}.pill.day{background:var(--tint2);color:var(--gd);}.pill.norm{background:#EEF1F4;color:var(--gray);}.pill.viol{background:#FFF5F5;color:var(--red);}.pill.off{background:#EEF1F4;color:#8B95A1;}
  .del{background:none;border:none;color:var(--red);font-size:14px;font-weight:800;padding:8px;}
  .kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}.kpi3{grid-template-columns:1fr 1fr 1fr;}.kpi div{background:var(--tint);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center;}.kpi .n{font-size:28px;font-weight:800;color:var(--gd);}.kpi .l{font-size:12px;color:var(--gray);margin-top:3px;}.kpi .pink{background:var(--pink);border-color:var(--pinkbd);}.kpi .pink .n,.kpi .pink .l{color:var(--pinktxt);font-weight:900;}
  .sub{font-size:12px;color:var(--gray);font-weight:700;margin:14px 0 6px;}.empty{color:var(--gray);font-size:14px;text-align:center;padding:20px;}
  #reader{border-radius:12px;overflow:hidden;margin-bottom:10px;}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 18px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:50;max-width:90%;text-align:center;}.toast.show{opacity:1;}.toast.err{background:var(--red);}.toast.warn{background:#B8860B;}
  .sessionbar{background:var(--tint2);border:1px solid var(--g);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--gd);font-weight:700;margin-bottom:10px;}.note{background:var(--redbg);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:11px;font-size:13px;margin-bottom:10px;line-height:1.5;}.info{background:var(--tint);border:1px solid var(--tint2);color:var(--gd);border-radius:10px;padding:11px;font-size:13px;margin-bottom:10px;font-weight:700;line-height:1.5;}
  .pageBack{display:flex;align-items:center;width:100%;min-height:56px;border:2px solid var(--yellowbd);background:var(--yellow);color:#3A2A00;font-weight:900;border-radius:14px;padding:14px 16px;margin:0 0 14px;font-size:17px;box-shadow:0 4px 12px rgba(120,90,0,.15);}
  .readyChoiceGrid{display:grid;grid-template-columns:1fr;gap:12px;margin:10px 0 14px;}.readyChoiceCard{width:100%;border:2px solid var(--bd);background:#fff;border-radius:18px;padding:22px 18px;text-align:left;cursor:pointer;box-shadow:0 6px 18px rgba(0,94,62,.08);min-height:140px;display:flex;align-items:center;gap:16px;}.readyChoiceCard .icon{width:70px;height:70px;border-radius:18px;background:var(--g);color:#fff;font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;flex:0 0 70px;}.readyChoiceCard .title{font-size:22px;font-weight:900;color:var(--slate);}.readyChoiceCard .desc{font-size:14px;color:var(--gray);margin-top:5px;font-weight:700;}.selectedType{background:var(--tint);border:1.5px solid var(--tint2);border-radius:14px;padding:11px 14px;margin:0 0 12px;font-size:15px;font-weight:900;color:var(--gd);}
  .inputChoiceGrid{display:grid;gap:12px;margin:10px 0 14px;}.inputChoiceCard{width:100%;border:2px solid var(--bd);background:#fff;border-radius:18px;padding:20px 18px;text-align:left;cursor:pointer;box-shadow:0 6px 18px rgba(0,94,62,.08);}.inputChoiceCard.scan{display:flex;align-items:center;gap:16px;border-color:var(--tint2);}.inputChoiceCard .icon{width:70px;height:70px;border-radius:18px;background:var(--g);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;flex:0 0 70px;}.inputChoiceCard .title{font-size:20px;font-weight:900;color:var(--slate);}.inputChoiceCard .desc{font-size:14px;color:var(--gray);margin-top:5px;font-weight:700;}
  .crumb{background:#fff;border-bottom:1px solid var(--bd);padding:9px 14px;font-size:13px;color:var(--gray);display:flex;align-items:center;gap:6px;}.crumb b{color:var(--gd);}.back{background:var(--yellow);border:1.5px solid var(--yellowbd);color:#3A2A00;font-weight:900;font-size:14px;padding:7px 12px;border-radius:999px;}
  .acctActions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}.miniBtn{border:1px solid var(--bd);background:#fff;border-radius:8px;padding:7px 9px;font-size:12px;font-weight:800;color:var(--slate);}.miniBtn.green{border-color:var(--g);color:var(--g);}.miniBtn.red{border-color:var(--red);color:var(--red);}
  .loginBox{background:#fff;border:1px solid var(--bd);border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(0,94,62,.08);}.loginTitle{font-size:24px;font-weight:900;margin:4px 0 8px;}.loginHelp{font-size:14px;color:var(--gray);font-weight:700;line-height:1.5;margin-bottom:14px;}.modeSel{padding:7px 8px;border-radius:8px;border:none;background:#fff;color:var(--slate);font-size:12px;font-weight:800;max-width:120px;}
</style>
</head>
<body>
<header>
  <div class="brand"><span>FASSTO 스캔앱</span><button id="logoutBtn" class="logoutBtn" style="display:none" onclick="logout()">로그아웃</button></div>
  <div class="wd" id="wdLabel"></div>
  <div class="mycenter" id="myCenterBar" style="display:none"></div>
</header>
<div id="gsBanner" class="gsBanner loading">구글 시트 연결 확인 중...</div>
<div id="crumb" class="crumb" style="display:none"></div>
<main id="app"></main>
<div id="toast" class="toast"></div>
<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbxeH-UJbv98tRwqn32EYNNBmnahTmnuOHoq00pTDOjISyppRgtAFluPs4fTpgXUkyp5Dw/exec";
const GROUPS=[{name:"용인1센터",floors:[["YI00","지하1층"],["YI01","1층"],["YI02","2층"],["YI03","3층"]]},{name:"용인2센터",floors:[["YI21","1층"],["YI22","2층"],["YI23","3층"]]}];
const FLOOR={}; GROUPS.forEach(g=>g.floors.forEach(f=>FLOOR[f[0]]={group:g.name,floor:f[1]}));
function centerName(c){return c==="ALL"?"전 센터":(FLOOR[c]?FLOOR[c].group+" "+FLOOR[c].floor:c);}
function centerOptions(sel,all){let o=all?`<option value="">전 센터</option>`:"";GROUPS.forEach(g=>g.floors.forEach(([code,fl])=>o+=`<option value="${code}" ${sel===code?"selected":""}>${g.name} ${fl} (${code})</option>`));return o;}
function workingDay(){const n=new Date();const d=new Date(n);if(n.getHours()<7)d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
let CACHE=JSON.parse(localStorage.getItem("fs_cache")||"{}");function saveCache(){localStorage.setItem("fs_cache",JSON.stringify(CACHE));}
let USER=JSON.parse(localStorage.getItem("fs_login_user")||"null");
let MASTER_MODE=localStorage.getItem("fs_master_mode")||"master";
let NAV={screen:USER?(USER.role==="master"?"center":"menu"):"login",center:null,func:null,readyStep:null};
let S={dtype:"당일",session:null,editAccountId:null};
function isMasterUser(){return USER&&USER.role==="master";}
function role(){return USER?(isMasterUser()?MASTER_MODE:USER.role):null;}
function roleLabel(r){return({out:"출고장",load:"상차장",master:"마스터"})[r]||r;}
function isWorker(){return role()==="out"||role()==="load";}
function currentCenter(){if(!USER)return null;if(isMasterUser())return NAV.center||"YI01";return USER.center||USER.assigned_center||"YI01";}
function onMasterModeChange(v){
  MASTER_MODE=v;
  sessionStorage.setItem("fs_master_mode",v);
  const keepCenter=NAV.center;
  if(v==="master"){
    NAV={screen:"masterdash",center:null,func:null,readyStep:null};
  } else {
    NAV={screen:keepCenter?"menu":"center",center:keepCenter,func:null,readyStep:null};
  }
  render();
}
function goCenter(c){NAV.center=c;NAV.screen="menu";render();} function goFunc(f){NAV.func=f;NAV.screen="func";NAV.readyStep=f==="ready"?"type":null;render();}
function back(){if(NAV.screen==="func"){NAV.screen=isMasterUser()&&!NAV.center?"masterdash":"menu";NAV.func=null;NAV.readyStep=null;}else if(NAV.screen==="menu"&&isMasterUser()){NAV.screen="masterdash";NAV.center=null;}render();}
function pageBackHtml(label){return `<button class="pageBack" onclick="back()">‹ ${label||"기능 메뉴로"}</button>`;}
function funcName(f){return({ready:"파렛트 준비 등록",load:"트럭 상차 스캔",loadstatus:"아직 안 실은 파렛트",loadedstatus:"트럭 상차 완료",dash:"현황 대시보드",depart:"상차내역·출차",accounts:"계정 관리"})[f]||f;}
async function gsGet(params){const qs=Object.entries(params).map(([k,v])=>k+"="+encodeURIComponent(v)).join("&");try{const r=await fetch(GS_URL+"?"+qs);return await r.json();}catch(e){return null;}}
async function gsPost(body){try{const r=await fetch(GS_URL,{method:"POST",body:JSON.stringify(body)});return await r.json();}catch(e){return null;}}
async function checkConnection(){const b=document.getElementById("gsBanner");b.className="gsBanner loading";b.textContent="구글 시트 연결 확인 중...";const r=await gsGet({action:"ping"});if(r&&r.ok){b.className="gsBanner ok";b.textContent="구글 시트 연결됨 ✓";return true;}b.className="gsBanner fail";b.textContent="구글 시트 연결 실패 — 관리자에게 문의하세요";return false;}
async function loadAccounts(){const r=await gsGet({action:"getAccounts"});if(r&&r.rows){CACHE.accounts=r.rows.map(a=>({ ...a,id:a.account_id,loginId:a.login_id,role:a.role,center:a.assigned_center,active:String(a.active||"").toUpperCase()!=="N",passwordSet:String(a.password_set||a.password||"").trim()!==""}));saveCache();}return CACHE.accounts||[];}
async function doLogin(){const id=(document.getElementById("loginId")?.value||"").trim();const pw=(document.getElementById("loginPw")?.value||"");if(!id||!pw){toast("로그인ID와 비밀번호를 입력하세요","err");return;}toast("로그인 확인 중...");const res=await gsPost({action:"loginAccount",login_id:id,password:pw});if(!res||!res.ok){toast((res&&res.msg)||"로그인 실패","err");return;}const a=res.account;USER={id:a.account_id,name:a.name||id,loginId:a.login_id,role:a.role,center:a.role==="master"?"ALL":a.assigned_center};localStorage.setItem("fs_login_user",JSON.stringify(USER));MASTER_MODE="master";localStorage.setItem("fs_master_mode",MASTER_MODE);NAV={screen:USER.role==="master"?"masterdash":"menu",center:null,func:null,readyStep:null};
toast(USER.name+"님 로그인");
render();
if(GS_URL){
  if(USER.role==="master"){
    // 마스터: 전체 센터 백그라운드 로드
    var allCodes=GROUPS.flatMap(function(g){return g.floors.map(function(f){return f[0];});});
    (async function(){
      for(var i=0;i<allCodes.length;i++) await loadData(allCodes[i]);
      if(NAV.screen==="masterdash") renderMasterDash();
    })();
  } else {
    // 작업자: 내 센터 데이터 로드
    loadData(USER.center||USER.assigned_center||"YI01");
  }
}}
function logout(){if(!confirm("로그아웃할까요?"))return;USER=null;localStorage.removeItem("fs_login_user");localStorage.removeItem("fs_master_mode");MASTER_MODE="master";NAV={screen:"login",center:null,func:null,readyStep:null};render();}
async function loadData(center){const wd=workingDay();const [r1,r2]=await Promise.all([gsGet({action:"getReady",center_code:center,working_day:wd}),gsGet({action:"getLoading",center_code:center,working_day:wd})]);if(r1&&r1.rows)CACHE.ready=(CACHE.ready||[]).filter(x=>x.center!==center||x.wd!==wd).concat(r1.rows.map(x=>({...x,center:x.center_code,code:x.label_code,dtype:x.delivery_type,wd:x.working_day,at:x.scanned_at,method:x.input_method,rowId:x.row_id,synced:true})));if(r2&&r2.rows)CACHE.loading=(CACHE.loading||[]).filter(x=>x.center!==center||x.wd!==wd).concat(r2.rows.map(x=>({...x,center:x.center_code,code:x.label_code,dtype:x.delivery_type,wd:x.working_day,at:x.scanned_at,method:x.input_method,rowId:x.row_id,departed:x.departed==="Y",viol:x.sequence_violation==="Y",vehicle:x.vehicle_no,synced:true})));saveCache();render();}
function readyOf(c){return (CACHE.ready||[]).filter(r=>r.center===c&&r.wd===workingDay()&&!r.deleted);} function loadedOf(c){return (CACHE.loading||[]).filter(r=>r.center===c&&r.wd===workingDay()&&!r.deleted);} function pendingOf(c){const lc=new Set(loadedOf(c).map(x=>x.code));return readyOf(c).filter(r=>!lc.has(r.code));}
let toastT;function toast(m,t){const e=document.getElementById("toast");e.className="toast show "+(t||"");e.textContent=m;clearTimeout(toastT);toastT=setTimeout(()=>e.className="toast",2500);}
async function readyScan(code,method){code=(code||"").trim().toUpperCase();if(!code)return toast("라벨 코드를 입력하세요","err");const c=currentCenter(),wd=workingDay();if(readyOf(c).some(r=>r.code===code))return toast("이미 준비 등록된 라벨입니다 ("+code+")","err");const tmpId="tmp_"+Date.now();const item={rowId:tmpId,center:c,code,dtype:S.dtype,wd,at:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),method:method||"스캔",synced:false,worker_account:USER.loginId};CACHE.ready=(CACHE.ready||[]).concat([item]);saveCache();if(scanner)await closeScanner();render();toast("준비 등록 ✓ "+code);const res=await gsPost({action:"addReady",data:{center_code:c,center_name:centerName(c),label_code:code,delivery_type:S.dtype,working_day:wd,scanned_at:item.at,input_method:item.method,worker_account:USER.loginId}});if(res&&res.ok){CACHE.ready=CACHE.ready.map(r=>r.rowId===tmpId?{...r,rowId:res.rowId,synced:true}:r);saveCache();}else if(res&&res.duplicate){CACHE.ready=CACHE.ready.filter(r=>r.rowId!==tmpId);saveCache();render();toast("이미 준비 등록된 라벨입니다","err");}}
async function delReady(rowId,code){if(!confirm(`라벨 [${code}]을 삭제하겠습니까?\n삭제 후 복구가 어렵습니다.`))return;CACHE.ready=(CACHE.ready||[]).filter(r=>r.rowId!==rowId);saveCache();render();toast("삭제했습니다");if(rowId&&!String(rowId).startsWith("tmp_"))await gsPost({action:"deleteReady",rowId});}
function startSession(){const v=(document.getElementById("veh")?.value||"").trim();S.session={center:currentCenter(),wd:workingDay(),vehicle:v,buffer:[],startedAt:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),worker:USER.loginId};render();toast("상차 시작"+(v?" · 차량 "+v:""));}
function cancelSession(){if(!confirm("상차를 취소하겠습니까?\n스캔한 데이터가 모두 사라집니다."))return;S.session=null;render();}
async function loadScan(code,method){code=(code||"").trim().toUpperCase();if(!code)return toast("라벨 코드를 입력하세요","err");if(!S.session)return toast("먼저 [트럭 상차 시작]을 누르세요","err");const c=currentCenter();if(loadedOf(c).some(r=>r.code===code)||S.session.buffer.some(b=>b.code===code))return toast("이미 상차된 라벨입니다 ("+code+")","err");const ready=readyOf(c).find(r=>r.code===code),viol=!ready;S.session.buffer.unshift({code,dtype:ready?ready.dtype:"-",viol,method:method||"스캔"});if(scanner)await closeScanner();render();toast(viol?("준비 등록 없이 상차됩니다 ("+code+") — 기록됨"):("상차 스캔 ✓ "+code),viol?"warn":"");}
function delSessionBuffer(i){const item=S.session.buffer[i];if(!confirm(`세션에서 [${item.code}]을 삭제하겠습니까?`))return;S.session.buffer.splice(i,1);render();}
async function completeLoad(){const n=S.session.buffer.length;if(!n)return toast("스캔된 파렛트가 없습니다","err");if(!confirm(`${n}개 상차가 맞습니까?\n차량: ${S.session.vehicle||"미입력"}`))return;const c=S.session.center,wd=S.session.wd,t=new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),sessionId="ses_"+Date.now();for(const b of S.session.buffer){const tmpId="tmp_"+Date.now()+"_"+b.code;CACHE.loading=(CACHE.loading||[]).concat([{rowId:tmpId,center:c,code:b.code,dtype:b.dtype,wd,vehicle:S.session.vehicle,viol:b.viol,at:t,method:b.method,departed:false,synced:false,worker_account:USER.loginId}]);const res=await gsPost({action:"addLoading",data:{center_code:c,center_name:centerName(c),label_code:b.code,working_day:wd,session_id:sessionId,vehicle_no:S.session.vehicle,loading_started_at:S.session.startedAt,scanned_at:t,loading_completed_at:t,input_method:b.method,worker_account:USER.loginId}});if(res&&res.ok)CACHE.loading=CACHE.loading.map(r=>r.rowId===tmpId?{...r,rowId:res.rowId,synced:true,viol:res.sequence_violation==="Y"}:r);}saveCache();S.session=null;render();toast(n+"개 상차 완료 ✓");}
async function delLoading(rowId,code){if(!confirm(`상차 기록 [${code}]을 삭제하겠습니까?`))return;CACHE.loading=(CACHE.loading||[]).filter(r=>r.rowId!==rowId);saveCache();render();toast("삭제했습니다");if(rowId&&!String(rowId).startsWith("tmp_"))await gsPost({action:"deleteLoading",rowId});}
async function toggleDepart(rowId,cur){const item=(CACHE.loading||[]).find(r=>r.rowId===rowId);if(!item)return;item.departed=!cur;saveCache();render();if(!String(rowId).startsWith("tmp_"))await gsPost({action:"updateDepart",rowId,departed:!cur});}
async function saveAccount(){const name=document.getElementById("accName")?.value.trim(),loginId=document.getElementById("accLogin")?.value.trim(),password=document.getElementById("accPw")?.value||"",accRole=document.getElementById("accRole")?.value,center=document.getElementById("accCenter")?.value;if(!name||!loginId)return toast("이름과 로그인ID를 입력하세요","err");if(!S.editAccountId&&!password)return toast("신규 계정은 비밀번호가 필요합니다","err");const data={name,login_id:loginId,password,role:accRole,assigned_center:accRole==="master"?"ALL":center,active:true,account_id:S.editAccountId||null};const res=await gsPost({action:"saveAccount",data});if(res&&res.ok){toast(S.editAccountId?"수정 완료":"계정 추가 완료");S.editAccountId=null;await loadAccounts();render();}else toast((res&&res.msg)||"저장 실패","err");}
function editAccount(id){S.editAccountId=id;funcAccounts();} function resetAccountForm(){S.editAccountId=null;funcAccounts();} async function toggleAccount(id){const res=await gsPost({action:"toggleAccount",accountId:id});if(res&&res.ok){await loadAccounts();render();}else toast("오류","err");} async function deleteAccount(id){if(!confirm("계정을 삭제하겠습니까?"))return;const res=await gsPost({action:"deleteAccount",accountId:id});if(res&&res.ok){await loadAccounts();render();}else toast("오류","err");} function onAccRoleChange(){const v=document.getElementById("accRole")?.value;const sel=document.getElementById("accCenter");if(sel)sel.disabled=v==="master";}
let scanner=null;function openScanner(cb){document.getElementById("app").innerHTML=`<h2>바코드 스캔</h2><div id="reader"></div><div class="note">카메라가 안 열리면 HTTPS 접속인지 확인하세요. 권한 요청 시 [허용]을 누르세요.</div><button class="btn ghost" onclick="closeScanner()">스캔 닫기</button>`;scanner=new Html5Qrcode("reader");scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:260,height:260},formatsToSupport:[Html5QrcodeSupportedFormats.QR_CODE,Html5QrcodeSupportedFormats.DATA_MATRIX,Html5QrcodeSupportedFormats.CODE_128]},t=>{if(navigator.vibrate)navigator.vibrate([60]);cb(t);},()=>{}).catch(e=>{document.getElementById("reader").innerHTML='<div class="empty">카메라를 열 수 없습니다.<br>HTTPS 접속 + 카메라 권한 필요<br><small>'+e+'</small></div>';});}
async function closeScanner(){if(scanner){try{await scanner.stop();}catch(e){}scanner=null;}render();}
function render(){document.getElementById("wdLabel").textContent="워킹데이 "+workingDay()+" (07:00~익일 06:59)";document.getElementById("logoutBtn").style.display=USER?"block":"none";const bar=document.getElementById("myCenterBar");if(USER){bar.style.display="flex";const modeHtml=isMasterUser()?`<div>작업모드: <select class="modeSel" onchange="onMasterModeChange(this.value)"><option value="master" ${MASTER_MODE==="master"?"selected":""}>마스터</option><option value="out" ${MASTER_MODE==="out"?"selected":""}>출고장</option><option value="load" ${MASTER_MODE==="load"?"selected":""}>상차장</option></select></div>`:"";bar.innerHTML=`<div>로그인: <b>${USER.name}</b> <span class="loginMeta">(${USER.loginId} · ${roleLabel(USER.role)})</span></div>${modeHtml}<div>${isMasterUser()?"선택 센터: ":"내 센터: "}<b>${isMasterUser()?(NAV.center?centerName(NAV.center)+" ("+NAV.center+")":"센터 선택 필요"):centerName(USER.center)+" ("+USER.center+")"}</b></div>`;}else bar.style.display="none";const cr=document.getElementById("crumb");if(!USER||isWorker()||NAV.screen==="center"||NAV.screen==="login"){cr.style.display="none";}else{cr.style.display="flex";cr.innerHTML=`<button class="back" onclick="back()">‹ 뒤로</button><span><b>${centerName(NAV.center||"")}</b>${NAV.screen==="func"?" › "+funcName(NAV.func):""}</span>`;}if(scanner)return;if(!USER||NAV.screen==="login")renderLogin();else if(NAV.screen==="masterdash")renderMasterDash();else if(NAV.screen==="center")renderCenter();else if(NAV.screen==="menu")renderMenu();else renderFunc();}
function renderLogin(){document.getElementById("app").innerHTML=`<div class="loginBox"><div class="loginTitle">로그인</div><div class="loginHelp">구글시트 accounts에 등록된 로그인ID와 비밀번호를 입력하세요.<br>로그인 후 권한과 센터가 자동 적용됩니다.</div><label>로그인ID</label><input type="text" id="loginId" placeholder="예: out01" autocomplete="username" style="min-height:52px;padding:14px;font-size:17px;"/><label>비밀번호</label><input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password" style="min-height:52px;padding:14px;font-size:17px;" onkeydown="if(event.key==='Enter')doLogin()"/><button class="btn" style="margin-top:12px" onclick="doLogin()">로그인</button></div><div class="info" style="margin-top:12px">마스터 계정은 로그인 후 상단에서 작업모드(마스터/출고장/상차장)를 선택할 수 있습니다.</div>`;}

function enterCenter(code){NAV.center=code;NAV.screen="menu";render();}
async function masterRefreshDash(){
  document.getElementById("app").innerHTML="<h2>전체 센터 현황</h2><div class='info'>데이터 불러오는 중...</div>";
  if(GS_URL){(async function(){var codes=GROUPS.flatMap(function(g){return g.floors.map(function(f){return f[0];});});for(var i=0;i<codes.length;i++)await loadData(codes[i]);renderMasterDash();})();return;}
  renderMasterDash();
}
function renderMasterDash(){
  var rows=GROUPS.flatMap(function(g){return g.floors.map(function(arr){
    var code=arr[0];
    var pend=pendingOf(code),loaded=loadedOf(code);
    return{code:code,pend:pend.length,loaded:loaded.length,pendDay:pend.filter(function(r){return r.dtype==="당일";}).length};
  });});
  var tP=rows.reduce(function(s,r){return s+r.pend;},0);
  var tL=rows.reduce(function(s,r){return s+r.loaded;},0);
  var h="<h2>전체 센터 현황</h2>";
  h+="<div class='kpi kpi3' style='margin-bottom:12px'>";
  h+="<div class='"+(tP>0?"pink":"")+"'><div class='n'>"+tP+"</div><div class='l'>준비완료 잔량</div></div>";
  h+="<div><div class='n'>"+tL+"</div><div class='l'>상차 완료</div></div>";
  h+="<div><div class='n'>"+rows.filter(function(r){return r.pend>0;}).length+"</div><div class='l'>잔량 있는 센터</div></div>";
  h+="</div>";
  h+="<button class='btn ghost' style='margin-bottom:12px;font-size:14px;min-height:44px' onclick='masterRefreshDash()'>&#128260; 전체 새로고침</button>";
  GROUPS.forEach(function(g){
    h+="<div class='grouplabel'>"+g.name+"</div>";
    g.floors.forEach(function(arr){
      var code=arr[0],fl=arr[1];
      var r=rows.find(function(x){return x.code===code;})||{pend:0,loaded:0,pendDay:0};
      h+="<div class='card' style='margin-bottom:8px'>";
      h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'>";
      h+="<div style='font-weight:800;font-size:15px'>"+g.name+" "+fl+" <span style='color:var(--gray);font-size:12px'>("+code+")</span></div>";
      h+="<button class='btn ghost' style='width:auto;padding:7px 12px;margin:0;font-size:13px;min-height:auto' onclick=\"enterCenter('"+code+"')\">진입</button>";
      h+="</div>";
      h+="<div class='kpi'>";
      h+="<div class='"+(r.pend>0?"pink":"")+"'><div class='n'>"+r.pend+"</div><div class='l'>준비완료 잔량"+(r.pendDay>0?" · 당일 "+r.pendDay:"")+"</div></div>";
      h+="<div><div class='n'>"+r.loaded+"</div><div class='l'>상차 완료</div></div>";
      h+="</div></div>";
    });
  });
  h+="<div class='sub' style='margin-top:14px'>관리 기능</div>";
  h+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px'>";
  h+="<button class='btn ghost' onclick=\"goFunc('depart')\">상차내역 · 출차</button>";
  h+="<button class='btn ghost' onclick=\"goFunc('accounts')\">계정 관리</button>";
  h+="<button class='btn ghost' onclick=\"goFunc('setup')\">구글 시트 설정</button>";
  h+="</div>";
  document.getElementById("app").innerHTML=h;
}

function renderCenter(){let html=`<h2>${isMasterUser()?roleLabel(role())+" 모드 · ":"마스터 · "}센터 선택</h2><div class="info">마스터는 상단 작업모드 드롭다운으로 마스터/출고장/상차장 화면을 전환할 수 있습니다.</div>`;GROUPS.forEach(g=>{html+=`<div class="grouplabel">${g.name}</div>`;g.floors.forEach(([code,fl])=>{const r=pendingOf(code).length,l=loadedOf(code).length;html+=`<div class="navrow" onclick="goCenter('${code}')"><div class="blk">${code}</div><div class="txt"><div class="t">${g.name} ${fl}</div><div class="d">준비완료 잔량 ${r} · 상차완료 ${l} (오늘)</div></div><span class="chev">›</span></div>`;});});document.getElementById("app").innerHTML=html;GROUPS.forEach(g=>g.floors.forEach(([code])=>{if(GS_URL)loadData(code);}));}
function renderMenu(){const r=role(),c=currentCenter();NAV.center=c;const ready=readyOf(c),loaded=loadedOf(c),pend=pendingOf(c);let funcs=[];if(r==="out")funcs=[{f:"ready",t:"파렛트 준비 등록",d:"라벨 스캔 후 준비 등록",badge:ready.length}];else if(r==="load")funcs=[{f:"loadstatus",t:"아직 안 실은 파렛트",d:"대기 중인 파렛트 확인",badge:pend.length},{f:"load",t:"트럭 상차 스캔",d:"트럭에 실을 때 스캔",badge:"시작"},{f:"loadedstatus",t:"트럭 상차 완료",d:"상차 완료된 파렛트 목록",badge:loaded.length}];else funcs=[{f:"dash",t:"현황 대시보드",d:"전 센터 준비완료잔량·상차완료",badge:""},{f:"depart",t:"상차내역·출차",d:"출차 처리",badge:loaded.length},{f:"accounts",t:"계정 관리",d:"계정 추가·수정",badge:(CACHE.accounts||[]).length}];let html=`<h2>${centerName(c)} · 작업 선택</h2>`;if(isWorker())html+=`<div class="info">${isMasterUser()?"마스터가 선택한 센터 기준으로 작업합니다.":"로그인한 계정의 센터 기준으로 작업합니다."}</div>`;funcs.forEach((x,i)=>{html+=`<div class="navrow funcCard" onclick="goFunc('${x.f}')"><div class="blk ${i===1?"dk":i===2?"gray":""}">${i+1}</div><div class="txt"><div class="t">${x.t}</div><div class="d">${x.d}</div></div>${x.badge!==""?`<span class="badge">${x.badge}</span>`:""}<span class="chev">›</span></div>`;});document.getElementById("app").innerHTML=html;}
function renderFunc(){const f=NAV.func;if(f==="ready")return funcReady();if(f==="load")return funcLoad();if(f==="loadstatus")return funcLoadStatus();if(f==="loadedstatus")return funcLoadedStatus();if(f==="dash")return funcDash();if(f==="depart")return funcDepart();if(f==="accounts")return funcAccounts();}
function funcReady(){const c=currentCenter(),list=readyOf(c),step=NAV.readyStep||"type";const listHtml=`<div class="sub">오늘 준비 등록 (${list.length}) · 최신순</div>${list.length?'<ul class="list">'+list.slice().reverse().map(it=>`<li class="li"><div><span class="code">${it.code}</span> <span class="pill ${it.dtype==="당일"?"day":"norm"}">${it.dtype}</span><div class="meta">${it.at} · ${it.method}${!it.synced?"  ⏳":"  ✓"}</div></div><button class="del" onclick="delReady('${it.rowId}','${it.code}')">삭제</button></li>`).join("")+'</ul>':'<div class="empty">아직 준비 등록된 파렛트가 없습니다.</div>'}`;if(step==="type"){document.getElementById("app").innerHTML=`${pageBackHtml()}<h2>파렛트 준비 등록</h2><div class="info">1. 배송유형을 먼저 선택하세요</div><div class="readyChoiceGrid"><button class="readyChoiceCard" onclick="S.dtype='당일';NAV.readyStep='input';render()"><div class="icon">당</div><div><div class="title">당일배송</div><div class="desc">오늘 먼저 실어야 하는 파렛트</div></div></button><button class="readyChoiceCard" onclick="S.dtype='일반';NAV.readyStep='input';render()"><div class="icon" style="background:#6B7684">일</div><div><div class="title">일반배송</div><div class="desc">일반 출고 파렛트</div></div></button></div>${listHtml}`;return;}document.getElementById("app").innerHTML=`${pageBackHtml()}<button class="pageBack" style="margin-bottom:10px;background:#FFF3B0" onclick="NAV.readyStep='type';render()">‹ 배송유형 다시 선택</button><h2>파렛트 준비 등록</h2><div class="selectedType">선택한 배송유형: ${S.dtype}배송</div><div class="inputChoiceGrid"><button class="inputChoiceCard scan" onclick="openScanner(c=>readyScan(c))"><div class="icon">📷</div><div><div class="title">카메라로 라벨 스캔</div><div class="desc">카메라로 라벨을 비추면 자동 등록됩니다</div></div></button><div class="inputChoiceCard"><div class="title">라벨번호 직접 입력</div><div class="desc">카메라가 안 될 때 사용하세요</div><input type="text" id="manual" placeholder="라벨번호 입력 (예: YI010001)" style="margin-top:10px"/><button class="btn ghost" style="margin-top:8px" onclick="readyScan(document.getElementById('manual').value,'수기')">직접 입력으로 등록</button></div></div>${listHtml}`;}
function funcLoad(){const c=currentCenter();let body;if(S.session&&S.session.center===c){const bufHtml=S.session.buffer.length?`<div class="sub">이번에 스캔한 파렛트 (${S.session.buffer.length})</div><ul class="list">`+S.session.buffer.map((b,i)=>`<li class="li"><div><span class="code">${b.code}</span> ${b.viol?'<span class="pill viol">준비누락</span>':`<span class="pill ${b.dtype==="당일"?"day":"norm"}">${b.dtype}</span>`}</div><button class="del" onclick="delSessionBuffer(${i})">삭제</button></li>`).join("")+'</ul>':"";body=`<div class="sessionbar">상차 진행중 · 차량 ${S.session.vehicle||"미입력"} · ${S.session.buffer.length}개 (시작 ${S.session.startedAt})</div><button class="btn" onclick="openScanner(c=>loadScan(c))">📷 카메라로 라벨 스캔</button><input type="text" id="manualL" placeholder="라벨번호 직접 입력"/><button class="btn ghost" style="margin-top:8px" onclick="loadScan(document.getElementById('manualL').value,'수기')">라벨번호 직접 입력</button><div class="row2"><button class="btn dk" onclick="completeLoad()">상차 끝내기 (${S.session.buffer.length}개)</button><button class="btn danger" onclick="cancelSession()">상차 취소</button></div>${bufHtml}`;}else{body=`<div class="card"><label>차량번호 4자리 (선택)</label><input type="text" id="veh" placeholder="예: 5678" maxlength="4" inputmode="numeric"/><button class="btn" style="margin-top:12px" onclick="startSession()">트럭 상차 시작</button></div>`;}document.getElementById("app").innerHTML=`${pageBackHtml()}<h2>트럭 상차 스캔</h2><div class="info">트럭에 실제로 싣는 순간에만 스캔하세요</div>${body}`;}
function funcLoadStatus(){
  var c=currentCenter();
  function renderLS(){
    if(NAV.func!=="loadstatus")return;
    var pend=pendingOf(c),loaded=loadedOf(c);
    var day=pend.filter(function(r){return r.dtype==="당일";}),norm=pend.filter(function(r){return r.dtype==="일반";});
    var app=document.getElementById("app");if(!app)return;
    var h=pageBackHtml()+"<h2>아직 안 실은 파렛트</h2>"+
      "<div class='kpi kpi3'>"+
        "<div><div class='n'>"+day.length+"</div><div class='l'>당일 남음</div></div>"+
        "<div><div class='n'>"+norm.length+"</div><div class='l'>일반 남음</div></div>"+
        "<div><div class='n'>"+loaded.length+"</div><div class='l'>상차 완료</div></div>"+
      "</div>"+
      "<button class='btn ghost' style='margin-bottom:12px;font-size:14px;min-height:44px' onclick='loadData(currentCenter()).then(renderLS)'>&#128260; 새로고침</button>"+
      "<div class='sub'>당일 ("+day.length+")</div>"+
      (day.length?"<ul class='list'>"+day.map(function(r){return "<li class='li'><span class='code'>"+r.code+"</span><span class='pill day'>당일</span></li>";}).join("")+"</ul>":"<div class='empty'>당일 남음 없음</div>")+
      "<div class='sub'>일반 ("+norm.length+")</div>"+
      (norm.length?"<ul class='list'>"+norm.map(function(r){return "<li class='li'><span class='code'>"+r.code+"</span><span class='pill norm'>일반</span></li>";}).join("")+"</ul>":"<div class='empty'>일반 남음 없음</div>");
    app.innerHTML=h;
  }
  document.getElementById("app").innerHTML=pageBackHtml()+"<h2>아직 안 실은 파렛트</h2><div class='info'>데이터 불러오는 중...</div>";
  if(GS_URL){loadData(c).then(renderLS);}else{renderLS();}
}
function funcLoadedStatus(){const c=currentCenter(),loaded=loadedOf(c),day=loaded.filter(r=>r.dtype==="당일"),norm=loaded.filter(r=>r.dtype==="일반");document.getElementById("app").innerHTML=`${pageBackHtml()}<h2>트럭 상차 완료</h2><div class="kpi kpi3"><div><div class="n">${day.length}</div><div class="l">당일 완료</div></div><div><div class="n">${norm.length}</div><div class="l">일반 완료</div></div><div><div class="n">${loaded.length}</div><div class="l">전체 완료</div></div></div><div class="sub">완료 목록 (${loaded.length})</div>${loaded.length?'<ul class="list">'+loaded.map(l=>`<li class="li"><div><span class="code">${l.code}</span> <span class="pill ${l.dtype==="당일"?"day":"norm"}">${l.dtype}</span>${l.viol?' <span class="pill viol">준비누락</span>':''}<div class="meta">${l.at} · 차량 ${l.vehicle||"-"}</div></div><button class="del" onclick="delLoading('${l.rowId}','${l.code}')">삭제</button></li>`).join("")+'</ul>':'<div class="empty">아직 상차 완료된 파렛트가 없습니다.</div>'}`;}
function funcDash(){const rows=GROUPS.flatMap(g=>g.floors.map(([code])=>({code,pend:pendingOf(code).length,loaded:loadedOf(code).length,pendDay:pendingOf(code).filter(r=>r.dtype==="당일").length})));document.getElementById("app").innerHTML=`${pageBackHtml()}<h2>현황 대시보드 (전 센터)</h2><div class="info">준비완료 잔량 = 아직 트럭에 안 실은 파렛트. 마감 시 0이어야 합니다.</div>${S.session?`<div class="note">⚠ 세션 미마감: ${centerName(S.session.center)} 차량 ${S.session.vehicle||"미입력"} (${S.session.buffer.length}개)</div>`:""}${rows.map(r=>`<div class="card"><div style="font-weight:800;margin-bottom:8px">${centerName(r.code)} <span style="color:var(--gray);font-size:12px">(${r.code})</span></div><div class="kpi"><div class="pink"><div class="n">${r.pend}</div><div class="l">준비완료 잔량${r.pendDay?" · 당일 "+r.pendDay:""}</div></div><div><div class="n">${r.loaded}</div><div class="l">상차 완료</div></div></div></div>`).join("")}`;}
function funcDepart(){const c=currentCenter(),loaded=loadedOf(c);document.getElementById("app").innerHTML=`${pageBackHtml()}<h2>상차내역·출차</h2>${loaded.length?'<ul class="list">'+loaded.map(l=>`<li class="li"><div><span class="code">${l.code}</span> <span class="pill ${l.dtype==="당일"?"day":"norm"}">${l.dtype}</span>${l.viol?' <span class="pill viol">위반</span>':''}<div class="meta">${l.at} · 차량 ${l.vehicle||"-"}</div></div><button class="btn ghost" style="width:auto;padding:8px 12px;margin:0;font-size:13px;min-height:auto;${l.departed?"background:var(--gd);color:#fff;border-color:var(--gd)":""}" onclick="toggleDepart('${l.rowId}',${l.departed})">${l.departed?"출차완료":"출차"}</button></li>`).join("")+'</ul>':'<div class="empty">상차한 파렛트가 없습니다.</div>'}`;}
function funcAccounts(){
  if(GS_URL&&!(CACHE.accounts||[]).length){loadAccounts().then(funcAccounts);return;}
  const accs=CACHE.accounts||[];
  const editing=S.editAccountId?accs.find(function(a){return (a.id||a.account_id)===S.editAccountId;}):null;

  // 추가/수정 폼
  var formTitle=editing?"계정 수정 — "+editing.name:"계정 추가";
  var formHtml="<div class='card' style='"+(editing?"border:2px solid var(--g)":"")+"'>";
  formHtml+="<div style='font-weight:800;font-size:16px;margin-bottom:12px;"+(editing?"color:var(--gd)":"")+"'>"+formTitle+"</div>";
  if(!editing){
    formHtml+="<div class='info' style='margin-bottom:10px'>마스터 계정은 구글 시트 accounts 탭에서 직접 추가하세요.</div>";
  }
  formHtml+="<label>이름</label><input type='text' id='accName' value='"+(editing?editing.name||"":"")+"' placeholder='예: 홍길동'/>";
  formHtml+="<label>로그인ID</label><input type='text' id='accLogin' value='"+(editing?(editing.loginId||editing.login_id||""):"")+"' placeholder='예: out01'/>";
  formHtml+="<label>비밀번호"+(editing?" (변경 시에만 입력)":"")+"</label><input type='password' id='accPw' placeholder='"+(editing?"변경하지 않으면 비워두세요":"신규 계정 비밀번호")+"'/>";
  formHtml+="<label>권한등급</label><select class='formsel' id='accRole' onchange='onAccRoleChange()'>";
  formHtml+="<option value='out' "+(editing&&editing.role==="out"?"selected":"")+"'>출고장</option>";
  formHtml+="<option value='load' "+(editing&&editing.role==="load"?"selected":"")+"'>상차장</option>";
  if(editing&&editing.role==="master"){
    formHtml+="<option value='master' selected>마스터</option>";
  }
  formHtml+="</select>";
  formHtml+="<label>부여센터</label><select class='formsel' id='accCenter' "+(editing&&editing.role==="master"?"disabled":"")+"'>"+centerOptions(editing?editing.center||editing.assigned_center||"YI01":"YI01",false)+"</select>";
  formHtml+="<div class='row2' style='margin-top:12px'>";
  formHtml+="<button class='btn' onclick='saveAccount()'>"+(editing?"수정 저장":"계정 추가")+"</button>";
  formHtml+="<button class='btn ghost' onclick='resetAccountForm()'>"+(editing?"취소":"초기화")+"</button>";
  formHtml+="</div></div>";

  // 계정 목록
  var listHtml=accs.length?
    "<ul class='list'>"+accs.map(function(a){
      var isMasterAcc=a.role==="master";
      return "<li class='li'><div style='flex:1'><b>"+a.name+"</b> "+
        "<span class='pill "+(a.active?"day":"off")+"'>"+(a.active?"활성":"비활성")+"</span>"+
        " <span class='pill norm'>"+(isMasterAcc?"마스터":a.role==="out"?"출고장":"상차장")+"</span>"+
        "<div class='meta'>ID "+(a.loginId||a.login_id)+" · "+(a.role==="master"?"전 센터":centerName(a.center||a.assigned_center))+"</div>"+
        "</div><div class='acctActions'>"+
        "<button class='miniBtn green' onclick='editAccount(\""+(a.id||a.account_id)+"\")'>수정</button>"+
        (isMasterAcc
          ?"<span style='font-size:11px;color:var(--gray);padding:4px'>시트에서 관리</span>"
          :"<button class='miniBtn' onclick='toggleAccount(\""+(a.id||a.account_id)+"\")'>"+(a.active?"비활성":"활성")+"</button>"+
           "<button class='miniBtn red' onclick='deleteAccount(\""+(a.id||a.account_id)+"\")'>삭제</button>"
        )+
        "</div></li>";
    }).join("")+"</ul>"
    :"<div class='empty'>등록된 계정이 없습니다.</div>";

  document.getElementById("app").innerHTML=
    pageBackHtml()+
    "<h2>계정 관리</h2>"+
    formHtml+
    "<div class='sub'>계정 목록 ("+accs.length+")</div>"+
    listHtml+
    "<button class='btn ghost' style='margin-top:10px' onclick='loadAccounts().then(funcAccounts)'>목록 새로고침</button>";
}

// ── 초기 실행 ──────────────────────────────────────────
render();
if(GS_URL){
  checkConnection();
  // 이미 로그인된 마스터 계정이면 전체 센터 데이터 자동 로드
  if(USER&&USER.role==="master"){
    (async function(){
      var codes=GROUPS.flatMap(function(g){return g.floors.map(function(f){return f[0];});});
      for(var i=0;i<codes.length;i++) await loadData(codes[i]);
      if(NAV.screen==="masterdash") renderMasterDash();
    })();
  } else if(USER&&USER.role!=="master"){
    // 작업자는 내 센터만 로드
    loadData(USER.center||"YI01");
  }
} else {
  const b=document.getElementById("gsBanner");
  if(b){b.className="gsBanner fail";b.textContent="구글 시트 미연결 — 마스터 로그인 후 설정에서 URL을 입력하세요";}
}
</script>
</body>
</html>
