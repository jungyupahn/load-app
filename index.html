<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#00855B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FASSTO 스캔">
<title>팔레타이징·상차 스캔 (프로토타입 v4)</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--g:#00855B;--gd:#005E3E;--slate:#333D4B;--gray:#6B7684;--bd:#E5E8EB;--tint:#F4FAF7;--tint2:#D9F0E5;--red:#C0392B;--redbg:#FFF5F5;--yellow:#FFF8E1;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;background:#F7F9F8;color:var(--slate);}
  header{background:var(--g);color:#fff;padding:11px 14px;position:sticky;top:0;z-index:10;}
  .brand{font-weight:800;font-size:15px;letter-spacing:.4px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .brand select,.miniCenter select{padding:6px 8px;border-radius:8px;border:none;font-size:13px;font-weight:700;background:#fff;color:var(--slate);}
  .wd{margin-top:7px;font-size:11.5px;color:#D6ECE2;}
  .mycenter{margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 10px;font-size:12.5px;}
  .mycenter b{font-size:13.5px;color:#fff;}
  .miniCenter{display:flex;align-items:center;gap:6px;color:#E4F5EE;font-size:11px;white-space:nowrap;}
  .miniCenter select{font-size:11.5px;padding:5px 6px;max-width:116px;}
  .crumb{background:#fff;border-bottom:1px solid var(--bd);padding:9px 14px;font-size:13px;color:var(--gray);display:flex;align-items:center;gap:6px;}
  .crumb b{color:var(--gd);}
  .back{background:none;border:none;color:var(--g);font-weight:800;font-size:14px;padding:0 6px 0 0;}
  .proto{background:#FFF8E1;color:#7a5b00;font-size:11px;padding:5px 14px;text-align:center;border-bottom:1px solid #f0e2b0;}
  main{padding:14px;max-width:560px;margin:0 auto;padding-bottom:40px;}
  h2{font-size:16px;margin:2px 0 12px;color:var(--slate);}
  .grouplabel{font-size:12px;font-weight:800;color:var(--g);margin:16px 0 8px;}
  .card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:12px;}
  .navrow{display:flex;align-items:center;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:13px 14px;margin-bottom:9px;cursor:pointer;}
  .navrow .blk{width:42px;height:42px;border-radius:9px;background:var(--g);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 42px;}
  .navrow .blk.dk{background:var(--gd);} .navrow .blk.gray{background:#6B7684;}
  .navrow .txt{flex:1;margin-left:12px;}
  .navrow .t{font-weight:800;font-size:15px;}
  .navrow .d{font-size:11.5px;color:var(--gray);margin-top:2px;}
  .navrow .badge{font-weight:800;color:var(--gd);font-size:15px;margin-right:8px;}
  .navrow .chev{color:var(--gray);font-size:18px;}
  .navrow.funcCard{padding:20px 16px;min-height:92px;border-radius:16px;box-shadow:0 4px 14px rgba(0,94,62,.08);}
  .navrow.funcCard .blk{width:58px;height:58px;border-radius:14px;font-size:18px;flex-basis:58px;}
  .navrow.funcCard .txt{margin-left:14px;}
  .navrow.funcCard .t{font-size:18px;line-height:1.25;}
  .navrow.funcCard .d{font-size:13px;line-height:1.45;margin-top:4px;}
  .navrow.funcCard .badge{font-size:20px;background:var(--tint);border:1px solid var(--tint2);border-radius:12px;padding:7px 10px;min-width:42px;text-align:center;}
  .seg{display:flex;gap:8px;margin-bottom:12px;}
  .seg button{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--bd);background:#fff;font-size:14px;font-weight:700;color:var(--gray);}
  .seg button.on{background:var(--g);color:#fff;border-color:var(--g);}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:800;color:#fff;background:var(--g);margin-bottom:10px;}
  .btn.dk{background:var(--gd);} .btn.ghost{background:#fff;color:var(--g);border:1.5px solid var(--g);} .btn.danger{background:#fff;color:var(--red);border:1.5px solid var(--red);}
  .row2{display:flex;gap:8px;} .row2 .btn{flex:1;}
  input[type=text],select.formsel{width:100%;padding:12px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;background:#fff;}
  label{display:block;font-size:12px;font-weight:800;color:var(--gray);margin:10px 0 5px;}
  .list{list-style:none;margin:0;padding:0;}
  .li{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;background:#fff;gap:8px;}
  .code{font-family:Consolas,monospace;font-weight:700;font-size:15px;}
  .meta{font-size:11.5px;color:var(--gray);margin-top:2px;}
  .pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;display:inline-block;}
  .pill.day{background:var(--tint2);color:var(--gd);} .pill.norm{background:#EEF1F4;color:var(--gray);}
  .pill.viol{background:#FFF5F5;color:var(--red);} .pill.off{background:#EEF1F4;color:#8B95A1;}
  .del{background:none;border:none;color:var(--red);font-size:13px;font-weight:700;}
  .kpi{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .kpi div{background:var(--tint);border:1px solid var(--bd);border-radius:10px;padding:10px;text-align:center;}
  .kpi .n{font-size:24px;font-weight:800;color:var(--gd);} .kpi .l{font-size:11px;color:var(--gray);margin-top:2px;}
  .kpi .warn .n{color:var(--red);}
  .sub{font-size:12px;color:var(--gray);font-weight:700;margin:14px 0 6px;}
  .empty{color:var(--gray);font-size:13px;text-align:center;padding:18px;}
  #reader{border-radius:12px;overflow:hidden;margin-bottom:10px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;padding:11px 16px;border-radius:24px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:50;max-width:90%;text-align:center;}
  .toast.show{opacity:1;} .toast.err{background:var(--red);} .toast.warn{background:#B8860B;}
  .sessionbar{background:var(--tint2);border:1px solid var(--g);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--gd);font-weight:700;margin-bottom:10px;}
  .note{background:var(--redbg);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:10px;font-size:12px;margin-bottom:10px;}
  .info{background:var(--tint);border:1px solid var(--tint2);color:var(--gd);border-radius:10px;padding:10px;font-size:12px;margin-bottom:10px;font-weight:700;}
  .acctActions{display:flex;gap:6px;align-items:center;}
  .miniBtn{border:1px solid var(--bd);background:#fff;border-radius:8px;padding:7px 9px;font-size:12px;font-weight:800;color:var(--slate);}
  .miniBtn.green{border-color:var(--g);color:var(--g);} .miniBtn.red{border-color:var(--red);color:var(--red);}

  .mobileGuide{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:13px;margin-bottom:12px;}
  .mobileGuide .title{font-weight:900;color:var(--gd);margin-bottom:6px;}
  .mobileGuide .body{font-size:12.5px;color:var(--gray);line-height:1.55;}
  .rawTools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 12px;}
  .rawTabs{display:flex;gap:6px;overflow:auto;margin:8px 0 10px;padding-bottom:2px;}
  .rawTabs button{white-space:nowrap;border:1px solid var(--bd);background:#fff;border-radius:999px;padding:8px 10px;font-size:12px;font-weight:800;color:var(--gray);}
  .rawTabs button.on{background:var(--g);color:#fff;border-color:var(--g);}
  .rawBox{overflow:auto;background:#fff;border:1px solid var(--bd);border-radius:12px;margin-bottom:12px;}
  table.raw{border-collapse:collapse;min-width:980px;width:100%;font-size:12px;}
  table.raw th,table.raw td{border-bottom:1px solid var(--bd);padding:8px 9px;text-align:left;white-space:nowrap;}
  table.raw th{position:sticky;top:0;background:var(--tint);color:var(--gd);font-weight:900;}
  .rawJson{white-space:pre-wrap;font-family:Consolas,monospace;font-size:11.5px;line-height:1.45;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:10px;max-height:360px;overflow:auto;}
  @media (max-width:420px){
    header{padding:10px 12px;}
    .brand{font-size:14px;}
    main{padding:12px;}
    .mycenter{align-items:flex-start;flex-direction:column;}
    .miniCenter{width:100%;justify-content:space-between;}
    .miniCenter select{max-width:190px;}
    .navrow.funcCard{min-height:104px;padding:20px 15px;}
    .navrow.funcCard .blk{width:62px;height:62px;flex-basis:62px;font-size:19px;}
    .navrow.funcCard .t{font-size:19px;}
    .btn{padding:15px;font-size:16px;}
    .rawTools{grid-template-columns:1fr;}
  }

</style>
</head>
<body>
<header>
  <div class="brand"><span>FASSTO · 팔레타이징·상차 스캔</span>
    <select id="role" onchange="onRole()">
      <option value="out">출고장</option><option value="load">상차장</option><option value="master">마스터</option>
    </select></div>
  <div class="wd" id="wdLabel"></div>
  <div class="mycenter" id="myCenterBar" style="display:none"></div>
</header>
<div id="crumb" class="crumb" style="display:none"></div>
<div class="proto">프로토타입 — 작업자 센터는 실제 앱에서 계정에 1개 고정 · 휴대폰 접속/카메라 테스트는 HTTPS 환경 권장</div>
<main id="app"></main>
<div id="toast" class="toast"></div>

<script>
const GROUPS=[
 {name:"용인1센터",floors:[["YI00","지하1층"],["YI01","1층"],["YI02","2층"],["YI03","3층"]]},
 {name:"용인2센터",floors:[["YI21","1층"],["YI22","2층"],["YI23","3층"]]},
];
const FLOOR={}; GROUPS.forEach(g=>g.floors.forEach(f=>FLOOR[f[0]]={group:g.name,floor:f[1]}));
const CENTER_CODES=GROUPS.flatMap(g=>g.floors.map(f=>f[0]));
function centerName(c){return FLOOR[c]?FLOOR[c].group+" "+FLOOR[c].floor:c;}
function centerOptions(selected,includeAll){
  let html=includeAll?'<option value="ALL">전 센터</option>':'';
  GROUPS.forEach(g=>g.floors.forEach(([code])=>{html+=`<option value="${code}" ${selected===code?'selected':''}>${centerName(code)} (${code})</option>`;}));
  return html;
}
function defaultAccounts(){return [
  {id:"acct_1",name:"출고장 테스트",loginId:"out01",role:"out",center:"YI01",active:true},
  {id:"acct_2",name:"상차장 테스트",loginId:"load01",role:"load",center:"YI01",active:true},
  {id:"acct_3",name:"마스터",loginId:"master",role:"master",center:"ALL",active:true},
];}
function loadState(){
  const old=JSON.parse(localStorage.getItem("ps_v2")||"null")||{};
  const v3=JSON.parse(localStorage.getItem("ps_v3")||"null");
  const base=v3||old||{};
  return {ready:base.ready||[],loading:base.loading||[],session:base.session||null,dtype:base.dtype||"당일",assigned:base.assigned||{out:"YI01",load:"YI01"},accounts:base.accounts||defaultAccounts(),editAccountId:base.editAccountId||null};
}
let S=loadState();
let NAV={screen:role()==="master"?"center":"menu",center:role()==="master"?null:S.assigned[role()],func:null};
function save(){localStorage.setItem("ps_v3",JSON.stringify(S));}
function workingDay(){const n=new Date();const d=new Date(n);if(n.getHours()<7)d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function role(){return document.getElementById("role").value;}
function now(){return new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});}
let toastT;function toast(m,t){const e=document.getElementById("toast");e.className="toast show "+(t||"");e.textContent=m;clearTimeout(toastT);toastT=setTimeout(()=>e.className="toast",2200);}
function readyOf(c){return S.ready.filter(r=>r.center===c&&r.wd===workingDay());}
function loadOf(c){return S.loading.filter(r=>r.center===c&&r.wd===workingDay());}
function isWorker(){return role()==="out"||role()==="load";}
function currentCenter(){return isWorker()?S.assigned[role()]:NAV.center;}

function onRole(){
  const r=role();
  NAV={screen:r==="master"?"center":"menu",center:r==="master"?null:S.assigned[r],func:null};
  render();
}
function onWorkerCenterChange(v){S.assigned[role()]=v;save();NAV={screen:"menu",center:v,func:null};render();toast("테스트 센터 변경: "+centerName(v));}
function goCenter(c){NAV.center=c;NAV.screen="menu";render();}
function goFunc(f){NAV.func=f;NAV.screen="func";render();}
function back(){
  if(NAV.screen==="func"){NAV.screen="menu";NAV.func=null;}
  else if(NAV.screen==="menu"&&role()==="master"){NAV.screen="center";NAV.center=null;}
  render();
}

// ---- logic ----
function readyScan(code,method){
  code=(code||"").trim().toUpperCase();if(!code)return toast("코드를 입력하세요","err");
  const wd=workingDay(),c=currentCenter();
  if(S.ready.some(r=>r.center===c&&r.code===code&&r.wd===wd))return toast("중복: 이미 상차준비완료 ("+code+")","err");
  S.ready.unshift({center:c,code,dtype:S.dtype,wd,at:now(),method:method||"스캔",worker:role()});save();toast("상차준비완료 ✓ "+code);render();
}
function delReady(i){const c=currentCenter();const l=readyOf(c);S.ready=S.ready.filter(r=>r!==l[i]);save();render();}
function startSession(){const v=(document.getElementById("veh")?.value||"").trim();
  S.session={center:currentCenter(),wd:workingDay(),vehicle:v,buffer:[],startedAt:now(),worker:role()};save();render();toast("상차 시작"+(v?(" · 차량 "+v):""));}
function loadScan(code,method){
  code=(code||"").trim().toUpperCase();if(!S.session)return toast("먼저 [상차시작]","err");if(!code)return toast("코드를 입력하세요","err");
  const wd=workingDay(),c=currentCenter();
  if(S.loading.some(r=>r.center===c&&r.code===code&&r.wd===wd)||S.session.buffer.some(b=>b.code===code))return toast("중복: 이미 상차됨 ("+code+")","err");
  const ready=S.ready.find(r=>r.center===c&&r.code===code&&r.wd===wd),viol=!ready;
  S.session.buffer.unshift({code,dtype:ready?ready.dtype:"-",viol,method:method||"스캔"});save();
  toast(viol?("순서위반: 준비완료 없음 ("+code+")"):("상차 ✓ "+code),viol?"warn":"");render();
}
function cancelSession(){S.session=null;save();render();}
function completeLoad(){const n=S.session.buffer.length;if(!n)return toast("스캔된 파렛트 없음","err");
  if(!confirm(n+"개 상차가 맞습니까?\n\n차량: "+(S.session.vehicle||"미입력")))return;
  const t=now();S.session.buffer.forEach(b=>S.loading.unshift({center:S.session.center,code:b.code,dtype:b.dtype,wd:S.session.wd,vehicle:S.session.vehicle,viol:b.viol,at:t,method:b.method,departed:false,worker:S.session.worker}));
  S.session=null;save();toast(n+"개 상차완료 ✓");render();}
function toggleDepart(i){const l=loadOf(currentCenter());l[i].departed=!l[i].departed;save();render();}

// ---- account management ----
function roleLabel(r){return r==="out"?"출고장":r==="load"?"상차장":"마스터";}
function resetAccountForm(){S.editAccountId=null;save();render();}
function editAccount(id){S.editAccountId=id;save();render();}
function toggleAccount(id){const a=S.accounts.find(x=>x.id===id);if(a){a.active=!a.active;save();render();}}
function deleteAccount(id){if(!confirm("계정을 삭제할까요?"))return;S.accounts=S.accounts.filter(a=>a.id!==id);if(S.editAccountId===id)S.editAccountId=null;save();render();}
function saveAccount(){
  const id=S.editAccountId;
  const name=document.getElementById("accName").value.trim();
  const loginId=document.getElementById("accLogin").value.trim();
  const accRole=document.getElementById("accRole").value;
  const center=document.getElementById("accCenter").value;
  if(!name||!loginId)return toast("이름과 로그인ID를 입력하세요","err");
  if(accRole!=="master"&&center==="ALL")return toast("작업자 계정은 부여센터 1개를 선택하세요","err");
  if(id){const a=S.accounts.find(x=>x.id===id);Object.assign(a,{name,loginId,role:accRole,center:accRole==="master"?"ALL":center});toast("계정 수정 완료");}
  else{S.accounts.unshift({id:"acct_"+Date.now(),name,loginId,role:accRole,center:accRole==="master"?"ALL":center,active:true});toast("계정 추가 완료");}
  S.editAccountId=null;save();render();
}
function onAccRoleChange(){const r=document.getElementById("accRole").value;const c=document.getElementById("accCenter");if(r==="master"){c.value="ALL";c.disabled=true;}else{c.disabled=false;if(c.value==="ALL")c.value="YI01";}}

// ---- scanner ----
let scanner=null;
function openScanner(cb){
  document.getElementById("app").innerHTML=`<h2>바코드 스캔</h2><div id="reader"></div>
    <div class="note">카메라가 안 열리면 HTTPS(보안 연결) 접속인지 확인 · 권한 요청 시 [허용].</div>
    <button class="btn ghost" onclick="closeScanner()">스캔 닫기</button>`;
  scanner=new Html5Qrcode("reader");
  const cfg={fps:10,qrbox:{width:240,height:240},formatsToSupport:[Html5QrcodeSupportedFormats.QR_CODE,Html5QrcodeSupportedFormats.DATA_MATRIX,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.PDF_417]};
  scanner.start({facingMode:"environment"},cfg,t=>{if(navigator.vibrate)navigator.vibrate(60);cb(t);},()=>{})
   .catch(e=>{document.getElementById("reader").innerHTML='<div class="empty">카메라를 열 수 없습니다.<br>HTTPS 접속 + 카메라 권한을 확인하세요.<br><small>'+e+'</small></div>';});
}
async function closeScanner(){if(scanner){try{await scanner.stop();}catch(e){}scanner=null;}render();}

// ---- render dispatch ----
function render(){
  document.getElementById("wdLabel").textContent="워킹데이 "+workingDay()+" · 07:00 경계";
  renderMyCenterBar();
  const cr=document.getElementById("crumb");
  if(isWorker()||NAV.screen==="center"){cr.style.display="none";}
  else{cr.style.display="flex";
    cr.innerHTML=`<button class="back" onclick="back()">‹ 뒤로</button>`+
      `<span><b>${centerName(NAV.center)}</b>${NAV.screen==="func"?(" › "+funcName(NAV.func)):""}</span>`;}
  if(scanner)return;
  if(NAV.screen==="center")renderCenter();
  else if(NAV.screen==="menu")renderMenu();
  else renderFunc();
}
function renderMyCenterBar(){
  const bar=document.getElementById("myCenterBar");
  if(!isWorker()){bar.style.display="none";bar.innerHTML="";return;}
  const c=currentCenter();bar.style.display="flex";
  bar.innerHTML=`<div>내 센터: <b>${centerName(c)} (${c})</b></div>
    <div class="miniCenter">테스트 변경 <select onchange="onWorkerCenterChange(this.value)">${centerOptions(c,false)}</select></div>`;
}
function funcName(f){return({ready:"상차준비완료",load:"상차",loadstatus:"상차 대기 현황",dash:"현황 대시보드",depart:"상차내역·출차",rawdata:"로우데이터",accounts:"계정 관리"})[f]||f;}

function renderCenter(){
  const app=document.getElementById("app");
  let html=`<h2>마스터 · 센터 선택</h2><div class="info">마스터는 전 센터 접근 권한이 있어 센터 그룹 → 층 선택 후 기능 메뉴로 진입합니다.</div>`;
  GROUPS.forEach(g=>{
    html+=`<div class="grouplabel">${g.name}</div>`;
    g.floors.forEach(([code,fl])=>{
      const r=readyOf(code).length,l=loadOf(code).length;
      html+=`<div class="navrow" onclick="goCenter('${code}')">
        <div class="blk">${code}</div>
        <div class="txt"><div class="t">${g.name} ${fl}</div><div class="d">준비 ${r} · 상차 ${l} (오늘)</div></div>
        <span class="chev">›</span></div>`;
    });
  });
  app.innerHTML=html;
}

function renderMenu(){
  const app=document.getElementById("app");const r=role();const c=currentCenter();NAV.center=c;
  const ready=readyOf(c),loaded=loadOf(c);const lc=new Set(loaded.map(x=>x.code));
  const pend=ready.filter(x=>!lc.has(x.code));
  let funcs=[];
  if(r==="out")funcs=[{f:"ready",t:"상차준비완료",d:"팔레타이징 스캔·등록·삭제",badge:ready.length}];
  else if(r==="load")funcs=[{f:"load",t:"상차",d:"상차시작 → 스캔 → 상차완료",badge:loaded.length},{f:"loadstatus",t:"상차 대기 현황",d:"당일 상단 · 일반 하단",badge:pend.length}];
  else funcs=[{f:"dash",t:"현황 대시보드",d:"전 센터 준비/상차/미상차",badge:""},{f:"depart",t:"상차내역 · 출차",d:"선택 센터 상차완료분 출차 토글",badge:loaded.length},{f:"rawdata",t:"로우데이터",d:"palletizing_ready / loading / accounts 누적 조회",badge:S.ready.length+S.loading.length},{f:"accounts",t:"계정 관리",d:"계정 추가·수정·활성/비활성",badge:S.accounts.length}];
  let html=`<h2>${r==="master"?centerName(c)+" · 마스터 기능":centerName(c)+" · 기능"}</h2>`;
  html+=mobileGuideHtml();
  if(isWorker())html+=`<div class="info">작업자 계정은 부여센터 1개 고정 구조입니다. 현재 화면은 로그인 후 센터 선택 없이 바로 진입한 상태입니다.</div>`;
  funcs.forEach((x,i)=>{
    html+=`<div class="navrow funcCard" onclick="goFunc('${x.f}')">
      <div class="blk ${i===1?'dk':i===2?'gray':''}">${i+1}</div>
      <div class="txt"><div class="t">${x.t}</div><div class="d">${x.d}</div></div>
      ${x.badge!==""?`<span class="badge">${x.badge}</span>`:""}<span class="chev">›</span></div>`;
  });
  app.innerHTML=html;
}

function renderFunc(){
  const f=NAV.func;
  if(f==="ready")return funcReady();
  if(f==="load")return funcLoad();
  if(f==="loadstatus")return funcLoadStatus();
  if(f==="dash")return funcDash();
  if(f==="depart")return funcDepart();
  if(f==="rawdata")return funcRawData();
  if(f==="accounts")return funcAccounts();
}

function funcReady(){
  const c=currentCenter(),list=readyOf(c);
  document.getElementById("app").innerHTML=`<h2>상차준비완료</h2>
   <div class="card">
     <div class="seg">
       <button class="${S.dtype==='당일'?'on':''}" onclick="S.dtype='당일';save();render()">당일배송</button>
       <button class="${S.dtype==='일반'?'on':''}" onclick="S.dtype='일반';save();render()">일반배송</button>
     </div>
     <button class="btn" onclick="openScanner(c=>readyScan(c))">📷 이미지 스캔</button>
     <input type="text" id="manual" placeholder="라벨코드 수기입력 (예: ${c}0001)"/>
     <button class="btn ghost" style="margin-top:8px" onclick="readyScan(document.getElementById('manual').value,'수기')">수기 등록</button>
   </div>
   <div class="sub">오늘 등록 (${list.length}) · 최신순</div>
   ${list.length?'<ul class="list">'+list.map((it,i)=>`<li class="li"><div>
     <span class="code">${it.code}</span> <span class="pill ${it.dtype==='당일'?'day':'norm'}">${it.dtype}</span>
     <div class="meta">${it.at} · ${it.method}</div></div><button class="del" onclick="delReady(${i})">삭제</button></li>`).join("")+'</ul>'
     :'<div class="empty">아직 등록된 파렛트가 없습니다.</div>'}`;
}

function funcLoad(){
  const c=currentCenter();let body;
  if(S.session&&S.session.center===c){
    body=`<div class="sessionbar">상차중 · 차량 ${S.session.vehicle||'미입력'} · 스캔 ${S.session.buffer.length}개 (시작 ${S.session.startedAt})</div>
      <button class="btn" onclick="openScanner(c=>loadScan(c))">📷 이미지 스캔</button>
      <input type="text" id="manualL" placeholder="라벨코드 수기입력"/>
      <button class="btn ghost" style="margin-top:8px" onclick="loadScan(document.getElementById('manualL').value,'수기')">수기 상차</button>
      <div class="row2"><button class="btn dk" onclick="completeLoad()">상차완료 (${S.session.buffer.length}개)</button><button class="btn ghost" onclick="cancelSession()">취소</button></div>
      ${S.session.buffer.length?'<div class="sub">이번 세션 스캔</div><ul class="list">'+S.session.buffer.map(b=>`<li class="li"><div><span class="code">${b.code}</span> ${b.viol?'<span class="pill viol">순서위반</span>':`<span class="pill ${b.dtype==='당일'?'day':'norm'}">${b.dtype}</span>`}</div></li>`).join("")+'</ul>':''}`;
  }else{
    body=`<div class="card"><input type="text" id="veh" placeholder="차량번호 4자리 (선택)" maxlength="4" inputmode="numeric"/>
      <button class="btn" style="margin-top:10px" onclick="startSession()">상차 시작</button></div>`;
  }
  const loaded=loadOf(c);
  document.getElementById("app").innerHTML=`<h2>상차</h2>${body}
   <div class="sub">오늘 상차완료 (${loaded.length})</div>
   ${loaded.length?'<ul class="list">'+loaded.map(l=>`<li class="li"><div><span class="code">${l.code}</span> <span class="pill ${l.dtype==='당일'?'day':'norm'}">${l.dtype}</span>${l.viol?' <span class="pill viol">위반</span>':''}<div class="meta">${l.at} · 차량 ${l.vehicle||'-'}</div></div></li>`).join("")+'</ul>':'<div class="empty">상차 내역 없음</div>'}`;
}

function funcLoadStatus(){
  const c=currentCenter(),ready=readyOf(c),loaded=loadOf(c);const lc=new Set(loaded.map(x=>x.code));
  const pend=ready.filter(x=>!lc.has(x.code));
  const day=pend.filter(r=>r.dtype==='당일'),norm=pend.filter(r=>r.dtype==='일반');
  document.getElementById("app").innerHTML=`<h2>상차 대기 현황</h2>
   <div class="kpi"><div><div class="n">${day.length}</div><div class="l">당일 대기</div></div>
     <div><div class="n">${norm.length}</div><div class="l">일반 대기</div></div>
     <div><div class="n">${loaded.length}</div><div class="l">상차완료</div></div></div>
   <div class="sub">당일 (${day.length})</div>
   ${day.length?'<ul class="list">'+day.map(r=>`<li class="li"><span class="code">${r.code}</span><span class="pill day">당일</span></li>`).join("")+'</ul>':'<div class="empty">당일 대기 없음</div>'}
   <div class="sub">일반 (${norm.length})</div>
   ${norm.length?'<ul class="list">'+norm.map(r=>`<li class="li"><span class="code">${r.code}</span><span class="pill norm">일반</span></li>`).join("")+'</ul>':'<div class="empty">일반 대기 없음</div>'}`;
}

function funcDash(){
  const wd=workingDay();
  const rows=[];GROUPS.forEach(g=>g.floors.forEach(([code])=>{
    const ready=S.ready.filter(r=>r.center===code&&r.wd===wd),loaded=S.loading.filter(l=>l.center===code&&l.wd===wd);
    const lc=new Set(loaded.map(l=>l.code)),pend=ready.filter(r=>!lc.has(r.code));
    rows.push({code,ready:ready.length,loaded:loaded.length,pend:pend.length,pendDay:pend.filter(r=>r.dtype==='당일').length});
  }));
  document.getElementById("app").innerHTML=`<h2>현황 대시보드 (전 센터)</h2>
   ${S.session?`<div class="note">⚠ 세션 미마감: ${centerName(S.session.center)} 차량 ${S.session.vehicle||'미입력'} 상차중 (${S.session.buffer.length}개)</div>`:''}
   ${rows.map(r=>`<div class="card"><div style="font-weight:800;margin-bottom:8px">${centerName(r.code)} <span style="color:var(--gray);font-weight:600;font-size:12px">(${r.code})</span></div>
     <div class="kpi"><div><div class="n">${r.ready}</div><div class="l">준비완료</div></div>
       <div><div class="n">${r.loaded}</div><div class="l">상차완료</div></div>
       <div class="${r.pendDay?'warn':''}"><div class="n">${r.pend}</div><div class="l">미상차${r.pendDay?(' · 당일 '+r.pendDay):''}</div></div></div></div>`).join("")}`;
}

function funcDepart(){
  const c=currentCenter(),loaded=loadOf(c);
  document.getElementById("app").innerHTML=`<h2>${centerName(c)} · 상차내역·출차</h2>
   ${loaded.length?'<ul class="list">'+loaded.map((l,i)=>`<li class="li"><div><span class="code">${l.code}</span> <span class="pill ${l.dtype==='당일'?'day':'norm'}">${l.dtype}</span>${l.viol?' <span class="pill viol">위반</span>':''}<div class="meta">${l.at} · 차량 ${l.vehicle||'-'}</div></div>
     <button class="btn ghost" style="width:auto;padding:7px 12px;margin:0;font-size:13px;${l.departed?'background:var(--gd);color:#fff;border-color:var(--gd)':''}" onclick="toggleDepart(${i})">${l.departed?'출차완료':'출차'}</button></li>`).join("")+'</ul>':'<div class="empty">상차 내역 없음</div>'}`;
}


function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function rawReadyRows(){return S.ready.map((r,i)=>({row_id:i+1,center_code:r.center,center_name:centerName(r.center),label_code:r.code,serial:(r.code||"").slice(-4),delivery_type:r.dtype,working_day:r.wd,scanned_at:r.at,worker_account:r.worker||"prototype_user",input_method:r.method,status:"정상"}));}
function rawLoadingRows(){return S.loading.map((r,i)=>({row_id:i+1,center_code:r.center,center_name:centerName(r.center),label_code:r.code,serial:(r.code||"").slice(-4),delivery_type:r.dtype,working_day:r.wd,session_id:r.session_id||"prototype_session",vehicle_no:r.vehicle||"",loading_started_at:r.loading_started_at||"",scanned_at:r.at,loading_completed_at:r.at,worker_account:r.worker||"prototype_user",input_method:r.method,sequence_violation:r.viol?"Y":"N",status:"상차완료",departed:r.departed?"Y":"N"}));}
function rawAccountRows(){return S.accounts.map((a,i)=>({account_id:a.id||i+1,name:a.name,login_id:a.loginId,role:roleLabel(a.role),assigned_center:a.role==='master'?'ALL':a.center,assigned_center_name:a.role==='master'?'전 센터':centerName(a.center),status:a.active?'활성':'비활성'}));}
function rawRows(type){if(type==='ready')return rawReadyRows();if(type==='loading')return rawLoadingRows();if(type==='accounts')return rawAccountRows();return [{key:'ps_v3',value:JSON.stringify(S,null,2)}];}
function rawTitle(type){return ({ready:'palletizing_ready',loading:'loading',accounts:'accounts',json:'localStorage JSON'})[type]||type;}
let RAW_TAB='ready';
function setRawTab(t){RAW_TAB=t;render();}
function rawTableHtml(type){
  if(type==='json')return `<div class="rawJson">${esc(JSON.stringify(S,null,2))}</div>`;
  const rows=rawRows(type); if(!rows.length)return '<div class="empty">누적된 데이터가 없습니다.</div>';
  const cols=Object.keys(rows[0]);
  return `<div class="rawBox"><table class="raw"><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function toCsv(rows){if(!rows.length)return '';const cols=Object.keys(rows[0]);const q=v=>'"'+String(v??'').replace(/"/g,'""')+'"';return [cols.join(','),...rows.map(r=>cols.map(c=>q(r[c])).join(','))].join('\n');}
function downloadRawCsv(type){const rows=rawRows(type);if(type==='json')return toast('JSON 탭은 복사 기능을 사용하세요','warn');const csv='\ufeff'+toCsv(rows);const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=rawTitle(type)+'_'+workingDay()+'.csv';a.click();URL.revokeObjectURL(a.href);}
async function copyRawJson(){try{await navigator.clipboard.writeText(JSON.stringify(S,null,2));toast('localStorage JSON 복사 완료');}catch(e){toast('복사 실패: 브라우저 권한 확인','err');}}
function mobileGuideHtml(){return `<div class="mobileGuide"><div class="title">📱 휴대폰 접속 세팅</div><div class="body">이 파일은 모바일 반응형으로 맞춰져 있습니다. 실제 카메라 스캔 테스트는 HTTPS 주소에서 여는 방식이 가장 안정적입니다. 사내 테스트는 GitHub Pages/Netlify 같은 HTTPS 정적 호스팅에 올리거나, PC에서 서버를 열고 휴대폰이 같은 Wi‑Fi에서 접속하면 됩니다. 단, 카메라 권한은 브라우저 정책상 HTTPS가 필요할 수 있습니다.</div></div>`;}
function funcRawData(){
  const counts={ready:rawReadyRows().length,loading:rawLoadingRows().length,accounts:rawAccountRows().length};
  document.getElementById('app').innerHTML=`<h2>로우데이터</h2>
    <div class="info">프로토타입에서는 Supabase 대신 이 브라우저의 localStorage(ps_v3)에 누적됩니다. 아래 표는 실제 DB 테이블 형태에 맞춰 변환해 보여주는 조회 화면입니다.</div>
    <div class="kpi"><div><div class="n">${counts.ready}</div><div class="l">palletizing_ready</div></div><div><div class="n">${counts.loading}</div><div class="l">loading</div></div><div><div class="n">${counts.accounts}</div><div class="l">accounts</div></div></div>
    <div class="rawTabs"><button class="${RAW_TAB==='ready'?'on':''}" onclick="setRawTab('ready')">palletizing_ready</button><button class="${RAW_TAB==='loading'?'on':''}" onclick="setRawTab('loading')">loading</button><button class="${RAW_TAB==='accounts'?'on':''}" onclick="setRawTab('accounts')">accounts</button><button class="${RAW_TAB==='json'?'on':''}" onclick="setRawTab('json')">localStorage JSON</button></div>
    <div class="rawTools"><button class="btn ghost" onclick="downloadRawCsv(RAW_TAB)">현재 탭 CSV 다운로드</button><button class="btn ghost" onclick="copyRawJson()">전체 JSON 복사</button></div>
    <div class="sub">${rawTitle(RAW_TAB)} 조회</div>${rawTableHtml(RAW_TAB)}`;
}

function funcAccounts(){
  const editing=S.accounts.find(a=>a.id===S.editAccountId);
  const e=editing||{name:"",loginId:"",role:"out",center:"YI01"};
  const rows=S.accounts.map(a=>`<li class="li"><div>
      <div><b>${a.name}</b> <span class="pill ${a.active?'day':'off'}">${a.active?'활성':'비활성'}</span></div>
      <div class="meta">ID ${a.loginId} · ${roleLabel(a.role)} · ${a.role==='master'?'전 센터':centerName(a.center)+' ('+a.center+')'}</div>
    </div><div class="acctActions"><button class="miniBtn green" onclick="editAccount('${a.id}')">수정</button><button class="miniBtn" onclick="toggleAccount('${a.id}')">${a.active?'비활성':'활성'}</button><button class="miniBtn red" onclick="deleteAccount('${a.id}')">삭제</button></div></li>`).join("");
  document.getElementById("app").innerHTML=`<h2>계정 관리</h2>
    <div class="info">프로토타입용 계정 데이터는 localStorage에 저장됩니다. 실제 앱에서는 Supabase 이메일 인증과 계정/센터 권한 테이블로 처리합니다.</div>
    <div class="card">
      <h2 style="margin-top:0">${editing?'계정 수정':'계정 추가'}</h2>
      <label>이름</label><input type="text" id="accName" value="${e.name}" placeholder="예: 홍길동"/>
      <label>로그인ID</label><input type="text" id="accLogin" value="${e.loginId}" placeholder="예: out01"/>
      <label>권한등급</label><select class="formsel" id="accRole" onchange="onAccRoleChange()">
        <option value="out" ${e.role==='out'?'selected':''}>출고장</option>
        <option value="load" ${e.role==='load'?'selected':''}>상차장</option>
        <option value="master" ${e.role==='master'?'selected':''}>마스터</option>
      </select>
      <label>부여센터</label><select class="formsel" id="accCenter" ${e.role==='master'?'disabled':''}>${centerOptions(e.role==='master'?'ALL':(e.center||'YI01'), e.role==='master')}</select>
      <div class="row2" style="margin-top:12px"><button class="btn" onclick="saveAccount()">${editing?'수정 저장':'계정 추가'}</button><button class="btn ghost" onclick="resetAccountForm()">초기화</button></div>
    </div>
    <div class="sub">계정 목록 (${S.accounts.length})</div>
    ${rows?'<ul class="list">'+rows+'</ul>':'<div class="empty">등록된 계정이 없습니다.</div>'}`;
}

render();
</script>
</body>
</html>
