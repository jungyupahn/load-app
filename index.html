<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#00855B">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FASSTO 상차 관리 앱</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--g:#00855B;--gd:#005E3E;--slate:#333D4B;--gray:#6B7684;--bd:#E5E8EB;--tint:#F4FAF7;--tint2:#D9F0E5;--red:#C0392B;--redbg:#FFF5F5;--yellow:#FFF8E1;--yellowbd:#E6C36A;--pink:#FFE0EA;--pinkbd:#FF7FA4;--pinktxt:#A80036;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;background:#F7F9F8;color:var(--slate);font-size:16px;}
  header{background:var(--g);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:10;}
  .brand{font-weight:800;font-size:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .logoutBtn{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;}
  .wd{margin-top:6px;font-size:12px;color:#D6ECE2;}
  .mycenter{margin-top:8px;display:flex;flex-direction:column;gap:4px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:9px 10px;font-size:13px;line-height:1.45;}
  .mycenter b{font-size:14px;color:#fff;}
  .loginMeta{font-size:12px;color:#E4F5EE;}
  .gsBanner{padding:7px 14px;font-size:12px;font-weight:700;text-align:center;border-bottom:1px solid var(--bd);}
  .gsBanner.ok{background:#E8F5E9;color:#1B5E20;}.gsBanner.fail{background:var(--redbg);color:var(--red);}.gsBanner.loading{background:var(--yellow);color:#7A5B00;}
  main{padding:14px;max-width:560px;margin:0 auto;padding-bottom:40px;}
  h2{font-size:20px;margin:4px 0 14px;color:var(--slate);}
  .grouplabel{font-size:12px;font-weight:800;color:var(--g);margin:16px 0 8px;}
  .card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px;}
  .navrow{display:flex;align-items:center;background:#fff;border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;}
  .navrow.funcCard{padding:20px 16px;min-height:100px;border-radius:16px;box-shadow:0 4px 14px rgba(0,94,62,.08);}
  .navrow .blk{width:52px;height:52px;border-radius:12px;background:var(--g);color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex:0 0 52px;}
  .navrow .blk.dk{background:var(--gd);} .navrow .blk.gray{background:#6B7684;}
  .navrow.funcCard .blk{width:62px;height:62px;border-radius:16px;font-size:20px;flex-basis:62px;}
  .navrow .txt{flex:1;margin-left:12px;}.navrow .t{font-weight:800;font-size:16px;}.navrow.funcCard .t{font-size:20px;}.navrow .d{font-size:12.5px;color:var(--gray);margin-top:3px;}.navrow.funcCard .d{font-size:14px;margin-top:5px;}
  .navrow .badge{font-weight:800;color:var(--gd);font-size:16px;margin-right:8px;background:var(--tint);border:1px solid var(--tint2);border-radius:10px;padding:6px 10px;min-width:40px;text-align:center;}
  .navrow .chev{color:var(--gray);font-size:20px;}
  .btn{display:block;width:100%;padding:15px;border:none;border-radius:13px;font-size:17px;font-weight:800;color:#fff;background:var(--g);margin-bottom:10px;min-height:54px;}
  .btn.dk{background:var(--gd);} .btn.ghost{background:#fff;color:var(--g);border:2px solid var(--g);} .btn.danger{background:#fff;color:var(--red);border:2px solid var(--red);} .btn:disabled{opacity:.4;}
  .row2{display:flex;gap:8px;} .row2 .btn{flex:1;}
  input[type=text],select.formsel{width:100%;padding:13px;border:2px solid var(--bd);border-radius:10px;font-size:16px;background:#fff;min-height:52px;}
  label{display:block;font-size:12px;font-weight:800;color:var(--gray);margin:10px 0 5px;}
  .list{list-style:none;margin:0;padding:0;}.li{display:flex;align-items:center;justify-content:space-between;padding:13px 12px;border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;background:#fff;gap:8px;min-height:62px;}.code{font-family:Consolas,monospace;font-weight:700;font-size:16px;}.meta{font-size:12px;color:var(--gray);margin-top:3px;}
  .pill{font-size:12px;font-weight:700;padding:4px 9px;border-radius:20px;display:inline-block;}.pill.day{background:var(--tint2);color:var(--gd);}.pill.norm{background:#EEF1F4;color:var(--gray);}.pill.viol{background:#FFF5F5;color:var(--red);}.pill.off{background:#EEF1F4;color:#8B95A1;}
  .del{background:none;border:none;color:var(--red);font-size:14px;font-weight:800;padding:8px;}
  .kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}.kpi3{grid-template-columns:1fr 1fr 1fr;}.kpi div{background:var(--tint);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center;}.kpi .n{font-size:28px;font-weight:800;color:var(--gd);}.kpi .l{font-size:12px;color:var(--gray);margin-top:3px;}.kpi .pink{background:var(--pink);border-color:var(--pinkbd);}.kpi .pink .n,.kpi .pink .l{color:var(--pinktxt);font-weight:900;}
  .sub{font-size:12px;color:var(--gray);font-weight:700;margin:14px 0 6px;}.empty{color:var(--gray);font-size:14px;text-align:center;padding:20px;}
  #reader{border-radius:12px;overflow:hidden;margin-bottom:10px;}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 18px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:50;max-width:90%;text-align:center;}.toast.show{opacity:1;}.toast.err{background:var(--red);}.toast.warn{background:#B8860B;}
  .sessionbar{background:var(--tint2);border:1px solid var(--g);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--gd);font-weight:700;margin-bottom:10px;}.note{background:var(--redbg);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:11px;font-size:13px;margin-bottom:10px;line-height:1.5;}.info{background:var(--tint);border:1px solid var(--tint2);color:var(--gd);border-radius:10px;padding:11px;font-size:13px;margin-bottom:10px;font-weight:700;line-height:1.5;}
  .pageBack{display:flex;align-items:center;width:100%;min-height:56px;border:2px solid var(--yellowbd);background:var(--yellow);color:#3A2A00;font-weight:900;border-radius:14px;padding:14px 16px;margin:0 0 14px;font-size:17px;box-shadow:0 4px 12px rgba(120,90,0,.15);}
  .readyChoiceGrid{display:grid;grid-template-columns:1fr;gap:12px;margin:10px 0 14px;}.readyChoiceCard{width:100%;border:2px solid var(--bd);background:#fff;border-radius:18px;padding:22px 18px;text-align:left;cursor:pointer;box-shadow:0 6px 18px rgba(0,94,62,.08);min-height:140px;display:flex;align-items:center;gap:16px;}.readyChoiceCard .icon{width:70px;height:70px;border-radius:18px;background:var(--g);color:#fff;font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;flex:0 0 70px;}.readyChoiceCard .title{font-size:22px;font-weight:900;color:var(--slate);}.readyChoiceCard .desc{font-size:14px;color:var(--gray);margin-top:5px;font-weight:700;}.selectedType{background:var(--tint);border:1.5px solid var(--tint2);border-radius:14px;padding:11px 14px;margin:0 0 12px;font-size:15px;font-weight:900;color:var(--gd);}
  .inputChoiceGrid{display:grid;gap:12px;margin:10px 0 14px;}.inputChoiceCard{width:100%;border:2px solid var(--bd);background:#fff;border-radius:18px;padding:20px 18px;text-align:left;cursor:pointer;box-shadow:0 6px 18px rgba(0,94,62,.08);}.inputChoiceCard.scan{display:flex;align-items:center;gap:16px;border-color:var(--tint2);}.inputChoiceCard .icon{width:70px;height:70px;border-radius:18px;background:var(--g);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;flex:0 0 70px;}.inputChoiceCard .title{font-size:20px;font-weight:900;color:var(--slate);}.inputChoiceCard .desc{font-size:14px;color:var(--gray);margin-top:5px;font-weight:700;}
  .crumb{background:#fff;border-bottom:1px solid var(--bd);padding:9px 14px;font-size:13px;color:var(--gray);display:flex;align-items:center;gap:6px;}.crumb b{color:var(--gd);}.back{background:var(--yellow);border:1.5px solid var(--yellowbd);color:#3A2A00;font-weight:900;font-size:14px;padding:7px 12px;border-radius:999px;}
  .acctActions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}.miniBtn{border:1px solid var(--bd);background:#fff;border-radius:8px;padding:7px 9px;font-size:12px;font-weight:800;color:var(--slate);}.miniBtn.green{border-color:var(--g);color:var(--g);}.miniBtn.red{border-color:var(--red);color:var(--red);}
  .loginBox{background:#fff;border:1px solid var(--bd);border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(0,94,62,.08);}.loginTitle{font-size:24px;font-weight:900;margin:4px 0 8px;}.loginHelp{font-size:14px;color:var(--gray);font-weight:700;line-height:1.5;margin-bottom:14px;}.modeSel{padding:7px 8px;border-radius:8px;border:none;background:#fff;color:var(--slate);font-size:12px;font-weight:800;max-width:120px;}

  .labelView{display:inline-flex;flex-direction:column;align-items:flex-start;justify-content:center;line-height:1.05;vertical-align:middle;margin-right:6px;}
  .labelTail{font-family:Consolas,monospace;font-weight:900;font-size:34px;letter-spacing:1px;color:var(--slate);}
  .labelFull{font-family:Consolas,monospace;font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.2px;margin-top:3px;}
  .labelView.small .labelTail{font-size:26px;}
  .labelView.small .labelFull{font-size:10px;}

  .reserveCard{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:13px;margin-bottom:10px;box-shadow:0 3px 10px rgba(0,94,62,.05);} 
  .reserveHead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .reserveVeh{font-size:22px;font-weight:900;color:var(--slate);letter-spacing:.5px;}
  .reserveMeta{font-size:12px;color:var(--gray);font-weight:700;margin-top:2px;line-height:1.45;}
  .reserveLine{display:grid;grid-template-columns:1fr 72px;gap:8px;align-items:center;border:1px solid var(--bd);border-radius:10px;padding:9px 10px;margin-bottom:7px;background:#FAFBFC;}
  .reserveLine b{font-size:14px;color:var(--slate);} .reserveLine small{display:block;color:var(--gray);font-size:11px;margin-top:2px;}
  .reserveInput{width:100%;padding:10px;border:2px solid var(--bd);border-radius:10px;font-size:18px;font-weight:900;text-align:center;background:#fff;min-height:46px;}
  .tabBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .tag{display:inline-block;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;background:var(--tint);color:var(--gd);border:1px solid var(--tint2);}


  /* 전체 센터 현황표: 기능별 그룹 시각 구분 */
  .dashTableWrap{overflow-x:auto;background:#fff;border:1px solid var(--bd);border-radius:14px;margin-top:8px;box-shadow:0 4px 12px rgba(0,94,62,.06);}
  .dashTable{width:100%;border-collapse:separate;border-spacing:0;min-width:720px;font-size:13px;}
  .dashTable th,.dashTable td{border-right:1px solid #DDE3E0;border-bottom:1px solid #E6ECE9;}
  .dashTable th:last-child,.dashTable td:last-child{border-right:none;}
  .dashGroupHead th{padding:9px 6px;text-align:center;font-weight:900;color:#153528;font-size:13px;border-bottom:2px solid #C7D6CF;}
  .dashCenterHead{background:var(--g)!important;color:#fff!important;text-align:left!important;padding-left:12px!important;vertical-align:middle;position:sticky;left:0;z-index:2;}
  .dashGroupHead .readyGroup{background:#EAF3FF;}
  .dashGroupHead .reserveGroup{background:#E8F5E9;border-left:3px solid #6CBF84;}
  .dashGroupHead .doneGroup{background:#EEF6F3;border-left:3px solid #8FB8A8;}
  .dashSubHead th{padding:8px 6px;text-align:center;font-weight:900;white-space:nowrap;color:#263238;font-size:12px;}
  .dashSubHead .readyDay{background:#FFEAF2;}
  .dashSubHead .readyNorm{background:#FFF8E1;}
  .dashSubHead .reserved{background:#E8F5E9;}
  .dashSubHead .unassigned{background:#FFF0F0;}
  .dashSubHead .overReserved{background:#FFF2CC;}
  .dashSubHead .loaded{background:#F1F6F4;}
  .dashCenter{padding:9px 10px;font-weight:800;font-size:13px;white-space:nowrap;background:#fff;position:sticky;left:0;z-index:1;}
  .dashCenter span{color:var(--gray);font-size:11px;font-weight:700;}
  .dashNum,.dashTotal{padding:8px 6px;text-align:center;font-size:15px;color:var(--gray);font-weight:700;background:#fff;white-space:nowrap;}
  .dashNum span,.dashTotal span{font-size:10px;font-weight:500;color:inherit;}
  .dashNum.readyDay.hasVal,.dashTotal.readyDay.hasVal{background:#FFF0F5;color:var(--pinktxt);font-weight:900;}
  .dashNum.readyNorm.hasVal,.dashTotal.readyNorm.hasVal{background:#FFF8E1;color:#7A5B00;font-weight:900;}
  .dashNum.reserved.hasVal,.dashTotal.reserved.hasVal{background:var(--tint);color:var(--gd);font-weight:900;}
  .dashNum.unassigned.hasVal,.dashTotal.unassigned.hasVal{background:var(--redbg);color:var(--red);font-weight:900;}
  .dashNum.overReserved.hasVal,.dashTotal.overReserved.hasVal{background:#FFF8E1;color:#B8860B;font-weight:900;}
  .dashNum.loaded,.dashTotal.loaded{color:var(--gd);font-weight:900;background:#FAFCFB;}
  .dashRow:nth-child(even) .dashCenter,.dashRow:nth-child(even) .dashNum{background-color:#FCFDFD;}
  .dashRow:hover .dashCenter,.dashRow:hover .dashNum{outline:2px solid rgba(0,133,91,.08);background-color:#F8FCFA;}
  .dashTable .groupEnd{border-right:3px solid #AFC5BB!important;}
  .dashGroupGap td{height:3px!important;padding:0!important;background:#D8E2DD!important;border:none!important;}
  .dashSumRow .dashCenter,.dashSumRow .dashTotal{background:#D9F0E5!important;border-top:2px solid var(--g);font-weight:900;}
  .dashLegend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:10px;font-size:11px;font-weight:800;color:var(--gray);}
  .dashLegend .lg{border-radius:999px;padding:5px 8px;background:#F2F4F6;}
  .dashLegend .ready{background:#EAF3FF;color:#1C4E80;}
  .dashLegend .reserve{background:#E8F5E9;color:var(--gd);}
  .dashLegend .done{background:#EEF6F3;color:#466B5C;}
  .dashLegend .warn{background:#FFF0F0;color:var(--red);}

</style>
</head>
<body>
<header>
  <div class="brand"><span>FASSTO 상차 관리 앱</span><button id="logoutBtn" class="logoutBtn" style="display:none" onclick="logout()">로그아웃</button></div>
  <div class="wd" id="wdLabel"></div>
  <div class="mycenter" id="myCenterBar" style="display:none"></div>
</header>
<div id="gsBanner" class="gsBanner loading">구글 시트 연결 확인 중...</div>
<div id="crumb" class="crumb" style="display:none"></div>
<main id="app"></main>
<div id="toast" class="toast"></div>
<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbxeH-UJbv98tRwqn32EYNNBmnahTmnuOHoq00pTDOjISyppRgtAFluPs4fTpgXUkyp5Dw/exec";
const GROUPS=[{name:"용인1센터",floors:[["YI00","지하1층"],["YI01","1층"],["YI02","2층"],["YI03","3층"]]},{name:"용인2센터",floors:[["YI21","1층"],["YI22","2층"],["YI23","3층"]]}];
const FLOOR={}; GROUPS.forEach(g=>g.floors.forEach(f=>FLOOR[f[0]]={group:g.name,floor:f[1]}));
function centerName(c){return c==="ALL"?"전 센터":(FLOOR[c]?FLOOR[c].group+" "+FLOOR[c].floor:c);}
function centerOptions(sel,all){let o=all?`<option value="">전 센터</option>`:"";GROUPS.forEach(g=>g.floors.forEach(([code,fl])=>o+=`<option value="${code}" ${sel===code?"selected":""}>${g.name} ${fl} (${code})</option>`));return o;}
function pad2(n){return String(n).padStart(2,"0");}
function kstDateString(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function normalizeDateForApp(v){
  const s=String(v||"").trim();
  if(!s) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    const d=new Date(s);
    return kstDateString(d);
  }
  const d=new Date(s);
  if(!isNaN(d.getTime())) return kstDateString(d);
  return s.slice(0,10);
}
function isDeletedFlag(v){return String(v||"").trim().toUpperCase()==="Y";}
function workingDay(){
  const n=new Date();
  const d=new Date(n);
  if(n.getHours()<7)d.setDate(d.getDate()-1);
  return kstDateString(d);
}
let CACHE=JSON.parse(localStorage.getItem("fs_cache")||"{}");function saveCache(){
  try{
    const today=workingDay();
    const todayDate=new Date(today+"T00:00:00");
    function isRecent(wd){
      if(!wd) return false;
      const d=new Date(wd+"T00:00:00");
      return (todayDate-d)<=3*24*60*60*1000;
    }
    if(CACHE.ready&&CACHE.ready.length>0) CACHE.ready=CACHE.ready.filter(function(r){return isRecent(r.wd);});
    if(CACHE.loading&&CACHE.loading.length>0) CACHE.loading=CACHE.loading.filter(function(r){return isRecent(r.wd);});
  }catch(e){}
  localStorage.setItem("fs_cache",JSON.stringify(CACHE));
}
let USER=JSON.parse(localStorage.getItem("fs_login_user")||"null");
let MASTER_MODE=localStorage.getItem("fs_master_mode")||"master";
let NAV={screen:USER?(USER.role==="master"?"masterdash":"menu"):"login",center:null,func:null,readyStep:null};
let S={dtype:"당일",session:null,editAccountId:null,masterDashType:null,afterCenterFunc:null,editReservationGroupId:null};
function isMasterUser(){return USER&&USER.role==="master";}
function role(){return USER?(isMasterUser()?MASTER_MODE:USER.role):null;}
function roleLabel(r){return({out:"출고장",load:"상차장",master:"마스터"})[r]||r;}
function isWorker(){return role()==="out"||role()==="load";}
function currentCenter(){if(!USER)return null;if(isMasterUser())return NAV.center||null;return USER.center||USER.assigned_center||"YI01";}
function onMasterModeChange(v){
  MASTER_MODE=v;
  localStorage.setItem("fs_master_mode",v);
  const keepCenter=NAV.center;
  if(v==="master"){
    S.masterDashType=null;
    NAV={screen:"masterdash",center:null,func:null,readyStep:null};
  } else {
    NAV={screen:keepCenter?"menu":"center",center:keepCenter,func:null,readyStep:null};
  }
  render();
}
function goCenter(c){NAV.center=c;if(S.afterCenterFunc){NAV.func=S.afterCenterFunc;S.afterCenterFunc=null;NAV.screen="func";NAV.readyStep=null;}else{NAV.screen="menu";}render();} function goFunc(f){NAV.func=f;NAV.screen="func";NAV.readyStep=f==="ready"?"type":null;render();}
function back(){if(NAV.screen==="func"){NAV.screen=isMasterUser()&&!NAV.center?"masterdash":"menu";NAV.func=null;NAV.readyStep=null;}else if(NAV.screen==="menu"&&isMasterUser()){NAV.screen="masterdash";NAV.center=null;}render();}
function pageBackHtml(label){return `<button class="pageBack" onclick="back()">‹ ${label||"기능 메뉴로"}</button>`;}
function funcName(f){return({ready:"파렛트 준비 등록",load:"트럭 상차 스캔",loadstatus:"아직 안 실은 파렛트",loadedstatus:"트럭 상차 완료",dash:"현황 대시보드",depart:"상차내역·출차",accounts:"계정 관리",prevdash:"전일 미상차 현황",reservation:"배정예약 관리"})[f]||f;}
async function gsGet(params){const qs=Object.entries(params).map(([k,v])=>k+"="+encodeURIComponent(v)).join("&");try{const r=await fetch(GS_URL+"?"+qs);return await r.json();}catch(e){return null;}}
async function gsPost(body){try{const r=await fetch(GS_URL,{method:"POST",body:JSON.stringify(body)});return await r.json();}catch(e){return null;}}
async function checkConnection(){const b=document.getElementById("gsBanner");b.className="gsBanner loading";b.textContent="구글 시트 연결 확인 중...";const r=await gsGet({action:"ping"});if(r&&r.ok){b.className="gsBanner ok";b.textContent="구글 시트 연결됨 ✓";return true;}b.className="gsBanner fail";b.textContent="구글 시트 연결 실패 — 관리자에게 문의하세요";return false;}

function dashboardRowsFallback(){
  return GROUPS.flatMap(function(g){return g.floors.map(function(arr){
    var code=arr[0];
    var pend=pendingOf(code),loaded=loadedOf(code);
    var pendDay=pend.filter(function(r){return r.dtype==="당일";}).length;
    var loadedDay=loaded.filter(function(r){return r.dtype==="당일";}).length;
    return {
      center_code:code,
      pending_count:pend.length,
      loaded_count:loaded.length,
      pending_day_count:pendDay,
      pending_norm_count:Math.max(pend.length-pendDay,0),
      loaded_day_count:loadedDay,
      loaded_norm_count:Math.max(loaded.length-loadedDay,0)
    };
  });});
}

let toastT;function toast(m,t){const e=document.getElementById("toast");e.className="toast show "+(t||"");e.textContent=m;clearTimeout(toastT);toastT=setTimeout(()=>e.className="toast",2500);}

// 라벨 표시 정책
// 현장 라벨은 작업자가 뒷자리 숫자만 보는 경우가 많으므로,
// 스캔 입력은 뒷자리 4자리 크게 + 전체번호 작게 표시하고,
// 수기 입력은 작업자가 입력한 값을 그대로 크게 표시합니다.
function normalizeLabelInput(raw){
  return String(raw||"").trim().replace(/\s+/g,"");
}
function escapeHtml(s){
  return String(s||"").replace(/[&<>'"]/g,function(ch){return ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"})[ch]||ch;});
}
function labelTail(code){
  const s=String(code||"");
  return s.length>=4?s.slice(-4):s;
}
function labelView(code,cls,method){
  const s=String(code||"");
  const isManual=String(method||"").indexOf("수기")>=0;
  const main=(isManual&&s.length<=4)?s:labelTail(s);
  const sub=isManual?(s.length>4?s:"수기 입력"):s;
  return "<span class='labelView "+(cls||"")+"'><span class='labelTail'>"+escapeHtml(main)+"</span><span class='labelFull'>"+escapeHtml(sub)+"</span></span>";
}
function jsArg(v){return encodeURIComponent(String(v||""));}
function labelCompareKey(code){
  const digits=String(code||"").replace(/\D/g,"");
  if(!digits) return "";
  const base=digits.length>=4?digits.slice(-4):digits;
  const normalized=String(Number(base));
  return normalized==="NaN"?base.replace(/^0+/,"")||"0":normalized;
}
function findSimilarLabels(code,items){
  const key=labelCompareKey(code);
  if(!key) return [];
  const exact=String(code||"");
  const seen={};
  return (items||[]).filter(function(it){
    const c=String((it&&it.code)||"");
    if(!c||c===exact) return false;
    if(labelCompareKey(c)!==key) return false;
    if(seen[c]) return false;
    seen[c]=true;
    return true;
  });
}
function confirmSimilarLabel(inputCode,similarItems,context){
  if(!similarItems||!similarItems.length) return true;
  const list=similarItems.slice(0,5).map(function(it){
    return "- "+it.code+(it.dtype?" ("+it.dtype+")":"");
  }).join("\n");
  const more=similarItems.length>5?"\n외 "+(similarItems.length-5)+"건":"";
  const msg="⚠ 뒷자리 숫자가 같은 라벨이 이미 있습니다.\n\n"+
    "입력값: "+inputCode+"\n"+
    "기존 라벨:\n"+list+more+"\n\n"+
    "같은 파렛트일 가능성이 있습니다.\n"+
    "그래도 "+(context||"진행")+"하시겠습니까?";
  return confirm(msg);
}

// 중복 스캔/저장 연타 방지
const SCAN_COOLDOWN_MS = 1000;
let SCAN_LOCK_UNTIL = 0;
let ACTION_LOCKS = {};
function scanGuard(){
  const now = Date.now();
  if(now < SCAN_LOCK_UNTIL) return false;
  SCAN_LOCK_UNTIL = now + SCAN_COOLDOWN_MS;
  return true;
}
function actionLock(key){
  if(ACTION_LOCKS[key]) return false;
  ACTION_LOCKS[key] = true;
  return true;
}
function actionUnlock(key){ delete ACTION_LOCKS[key]; }
function lockButton(label){
  let btn = null;
  try{ btn = (typeof event !== "undefined" && event && event.currentTarget && event.currentTarget.tagName === "BUTTON") ? event.currentTarget : null; }catch(e){}
  if(btn){
    btn.disabled = true;
    btn.dataset.oldText = btn.textContent || "";
    if(label) btn.textContent = label;
  }
  return btn;
}
function unlockButton(btn){
  if(btn){
    btn.disabled = false;
    if(btn.dataset.oldText) btn.textContent = btn.dataset.oldText;
  }
}

async function readyScan(code,method){
  code=normalizeLabelInput(code);
  if(!code)return toast("라벨 코드를 입력하세요","err");
  if(!scanGuard()) return; // 전체 스캔 1초 잠금
  const c=currentCenter(),wd=workingDay();
  const lockKey="ready:"+c+":"+wd+":"+code;
  if(!actionLock(lockKey)) return toast("저장 처리 중입니다. 잠시만 기다려주세요","warn");
  const btn=lockButton("저장 중...");
  try{
    if(readyOf(c).some(r=>r.code===code))return toast("이미 준비 등록된 라벨입니다 ("+code+")","err");
    const similarReady=findSimilarLabels(code,readyOf(c));
    if(similarReady.length && !confirmSimilarLabel(code,similarReady,"준비 등록")){
      toast("유사 라벨 확인 후 등록이 취소됐습니다","warn");
      return;
    }
    const tmpId="tmp_"+Date.now();
    const item={rowId:tmpId,center:c,code,dtype:S.dtype,wd,at:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),method:method||"스캔",synced:false,worker_account:USER.loginId};
    CACHE.ready=(CACHE.ready||[]).concat([item]);
    saveCache();
    if(scanner)await closeScanner();
    render();
    toast("준비 등록 ✓ "+code);
    const res=await gsPost({action:"addReady",data:{center_code:c,center_name:centerName(c),label_code:code,delivery_type:S.dtype,working_day:wd,scanned_at:item.at,input_method:item.method,worker_account:USER.loginId}});
    if(res&&res.ok){
      CACHE.ready=CACHE.ready.map(r=>r.rowId===tmpId?{...r,rowId:res.rowId,synced:true}:r);
      saveCache();
    }else if(res&&res.duplicate){
      CACHE.ready=CACHE.ready.filter(r=>r.rowId!==tmpId);
      saveCache();
      render();
      toast("이미 준비 등록된 라벨입니다","err");
    }else{
      CACHE.ready=CACHE.ready.filter(r=>r.rowId!==tmpId);
      saveCache();
      render();
      toast("시트 저장 실패 — 관리자에게 문의하세요","err");
    }
  }finally{
    actionUnlock(lockKey);
    unlockButton(btn);
  }
}

async function delReady(rowId,code){
  const c=currentCenter();
  const lockKey="delReady:"+rowId+":"+code;
  if(!actionLock(lockKey)) return toast("삭제 처리 중입니다. 잠시만 기다려주세요","warn");
  const btn=lockButton("확인 중...");
  try{
    if(!confirm(`라벨 [${code}]을 삭제하겠습니까?
삭제 후 복구가 어렵습니다.`))return;

    if(btn) btn.textContent="삭제 중...";

    // 삭제 확정 후 최신 상차 상태를 1회만 재조회합니다.
    // 기존 버전처럼 확인창 전에 비동기 재조회가 들어가면 일부 브라우저/현장 단말에서
    // 확인창이 반복되는 것처럼 보일 수 있어, 확인 이후로 순서를 변경했습니다.
    if(rowId&&!String(rowId).startsWith("tmp_")){
      try{await loadData(c);}catch(e){}
    }

    const loadedCodes=new Set(loadedOf(c).map(x=>String(x.code)));
    if(loadedCodes.has(String(code))){
      toast("상차 완료된 파렛트는 삭제할 수 없습니다. 마스터에게 문의하세요.","err");
      render();
      return;
    }

    if(rowId&&!String(rowId).startsWith("tmp_")){
      const res=await gsPost({
        action:"deleteReady",
        rowId:rowId,
        center_code:c,
        label_code:code,
        working_day:workingDay()
      });
      if(!(res&&res.ok)){
        const msg=(res&&res.msg)||((res&&res.error)?("서버 오류: "+res.error):"삭제 실패 — Apps Script 최신본 적용 여부를 확인하세요");
        toast(msg,"err");
        try{await loadData(c);}catch(e){}
        render();
        return;
      }
    }

    CACHE.ready=(CACHE.ready||[]).filter(r=>r.rowId!==rowId);
    saveCache();
    render();
    toast("삭제했습니다");
  }finally{
    actionUnlock(lockKey);
    unlockButton(btn);
  }
}

async function loadScan(code,method){
  code=normalizeLabelInput(code);
  if(!code)return toast("라벨 코드를 입력하세요","err");
  if(!scanGuard()) return;
  if(!S.session)return toast("먼저 [트럭 상차 시작]을 누르세요","err");
  const c=currentCenter();
  if(loadedOf(c).some(r=>r.code===code)||S.session.buffer.some(b=>b.code===code))return toast("이미 상차된 라벨입니다 ("+code+")","err");
  const similarLoad=findSimilarLabels(code,loadedOf(c).concat(S.session.buffer||[]));
  if(similarLoad.length && !confirmSimilarLabel(code,similarLoad,"상차 등록")){
    toast("유사 라벨 확인 후 상차가 취소됐습니다","warn");
    return;
  }
  const similarReady=findSimilarLabels(code,readyOf(c));
  if(similarReady.length && !confirmSimilarLabel(code,similarReady,"상차 진행")){
    toast("유사한 준비등록 라벨 확인 후 상차가 취소됐습니다","warn");
    return;
  }
  const ready=readyOf(c).find(r=>r.code===code),viol=!ready;
  const newDtype=ready?ready.dtype:"-";

  // ── 혼합 적재 방지 ─────────────────────────────
  if(S.session.buffer.length>0 && newDtype!=="-"){
    const existDtypes=new Set(S.session.buffer.map(function(b){return b.dtype;}).filter(function(d){return d!=="-";}));
    if(existDtypes.size>0 && !existDtypes.has(newDtype)){
      const existName=[...existDtypes][0];
      const msg="⚠ 혼합 적재 불가\n\n이 트럭에는 ["+existName+"] 파렛트가 이미 실려 있습니다.\n["+newDtype+"] 파렛트를 함께 실을 수 없습니다.\n\n기존 "+S.session.buffer.length+"개를 하차(삭제)하고 이 파렛트로 교체하시겠습니까?";
      if(!confirm(msg)){
        toast("혼합 적재 불가 — 스캔이 취소됐습니다","err");

async function completeLoad(){

    if(!confirm(`${n}개 상차가 맞습니까?
차량: ${S.session.vehicle||"미입력"}`))return;
    const c=S.session.center,wd=S.session.wd,t=new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),sessionId="ses_"+Date.now();
    let okCnt=0, failCnt=0;

  if(GS_URL&&(!CACHE.reservations||CACHE.reservations.working_day!==workingDay()||!CACHE.reservationSummary||CACHE.reservationSummary.working_day!==workingDay()||!CACHE.dashboard||CACHE.dashboard.working_day!==workingDay())){
    document.getElementById("app").innerHTML=pageBackHtml()+"<h2>배정예약 관리</h2><div class='info'>예약 데이터를 불러오는 중...</div>";
    Promise.all([loadReservations(workingDay()),loadReservationSummary(workingDay()),loadDashboard()]).then(funcReservation);
    return;
  }
  const groups=groupedReservations();
  const editing=S.editReservationGroupId?groups.find(function(g){return g.group_id===S.editReservationGroupId;}):null;
  const editMap={};
  if(editing){editing.rows.forEach(function(r){editMap[String(r.center_code)]=Number(r.reserved_plt||0);});}
  var h=pageBackHtml()+"<h2>배정예약 관리</h2>"+
    "<div class='info'>차량번호는 중복 등록을 허용합니다. 같은 차량이 여러 번 회전해도 예약건은 내부 예약회차 ID로 구분됩니다.</div>";
  if(CACHE.reservations&&CACHE.reservations.failed){h+="<div class='note'>배정예약 API 조회 실패 — Apps Script v11 배포 여부를 확인하세요.</div>";}
  h+="<div class='card' style='border:2px solid var(--g)'>"+
    "<div style='font-weight:900;font-size:17px;margin-bottom:10px'>"+(editing?"배차예약 수정":"새 배정예약 등록")+"</div>"+
    "<label>차량번호</label><input type='text' id='resVeh' placeholder='예: 5678' value='"+escapeHtml(editing?editing.vehicle_no:"")+"' inputmode='numeric'/>"+
    "<label>배송유형</label><select class='formsel' id='resType' onchange='updateResTotal()'><option value='당일' "+(editing&&editing.delivery_type==="당일"?"selected":"")+">당일배송</option><option value='일반' "+(!editing||editing.delivery_type!=="당일"?"selected":"")+">일반배송</option></select>"+
    "<label>메모</label><input type='text' id='resMemo' placeholder='예: 1차 회전 / 14시 도착 예정' value='"+escapeHtml(editing?editing.memo:"")+"'/>"+
    "<div class='sub'>센터별 예약 PLT</div>";
  GROUPS.forEach(function(g){
    h+="<div class='grouplabel'>"+g.name+"</div>";
    g.floors.forEach(function(arr){
      var code=arr[0],fl=arr[1],val=editMap[code]||0;
      h+="<div class='reserveLine'><div><b>"+code+" "+fl+"</b><small>"+centerName(code)+"</small><div class='meta' id='res_avail_"+code+"' style='margin-top:5px'></div></div><input class='reserveInput' id='res_"+code+"' type='number' min='0' step='1' inputmode='numeric' value='"+val+"' oninput='updateResTotal()'/></div>";
    });
  });
  h+="<div class='sessionbar'>예약 합계: <span id='resTotal'>0</span> PLT</div>"+
    "<div class='row2'><button class='btn' onclick='saveReservationFromForm()'>"+(editing?"수정 저장":"배정예약 등록")+"</button>"+
    "<button class='btn ghost' onclick='S.editReservationGroupId=null;funcReservation()'>"+(editing?"취소":"초기화")+"</button></div>"+
    "</div>";
  h+="<div class='sub'>예약 중 ("+groups.length+")</div>";
  if(!groups.length) h+="<div class='empty'>등록된 배차예약이 없습니다.</div>";
  groups.forEach(function(g){
    var total=g.rows.reduce(function(s,r){return s+Number(r.reserved_plt||0);},0);
    var lines=g.rows.map(function(r){return "<div class='meta'>- "+centerName(r.center_code)+" / "+r.delivery_type+" / "+Number(r.reserved_plt||0)+" PLT</div>";}).join("");
    h+="<div class='reserveCard'><div class='reserveHead'><div><div class='reserveVeh'>차량 "+escapeHtml(g.vehicle_no||"미입력")+"</div><div class='reserveMeta'>"+escapeHtml(g.delivery_type||"")+" · 예약 "+total+" PLT · "+escapeHtml(g.memo||"")+"</div></div><span class='tag'>"+escapeHtml(g.group_id.slice(-6))+"</span></div>"+lines+"<div class='row2' style='margin-top:10px'><button class='btn ghost' style='font-size:13px;min-height:42px;padding:9px' onclick='editReservation(\""+g.group_id+"\")'>수정</button><button class='btn danger' style='font-size:13px;min-height:42px;padding:9px' onclick='cancelReservation(\""+g.group_id+"\")'>예약 취소</button></div></div>";
  });
  h+="<button class='btn ghost' onclick='Promise.all([loadReservations(workingDay()),loadReservationSummary(workingDay()),loadDashboard()]).then(funcReservation)'>목록 새로고침</button>";
  document.getElementById("app").innerHTML=h;
  setTimeout(updateResTotal,0);
}
function updateResTotal(){
  var total=0;
  var dtype=(document.getElementById('resType')&&document.getElementById('resType').value)||'일반';
  GROUPS.forEach(function(g){g.floors.forEach(function(arr){
    var code=arr[0];
    var el=document.getElementById('res_'+code);
    var n=Number(el&&el.value||0);
    if(n<0){n=0;if(el)el.value=0;}
    total+=n;
    var avail=dashboardPendingFor(code,dtype);
    var over=overReservationCount(avail,n);
    var meta=document.getElementById('res_avail_'+code);
    if(meta){
      meta.innerHTML=over>0?('현재 준비잔량 '+avail+' PLT · <b style="color:#B8860B">초과예약 '+over+' PLT</b>'):('현재 준비잔량 '+avail+' PLT');
    }
    if(el){el.style.borderColor=over>0?'#E6C36A':'';el.style.background=over>0?'#FFF8E1':'';}
  });});
  var t=document.getElementById('resTotal');if(t)t.textContent=String(total);
}
async function saveReservationFromForm(){
  if(!isMasterUser()) return toast("배정예약은 마스터만 등록할 수 있습니다","err");
  if(!actionLock("saveReservation")) return toast("예약 저장 중입니다. 잠시만 기다려주세요","warn");
  const btn=lockButton("저장 중...");
  try{
    const veh=(document.getElementById('resVeh')?.value||'').trim();
    const dtype=document.getElementById('resType')?.value||'일반';
    const memo=(document.getElementById('resMemo')?.value||'').trim();
    if(!veh) return toast("차량번호를 입력하세요","err");
    const centers=[];GROUPS.forEach(function(g){g.floors.forEach(function(arr){var code=arr[0];var el=document.getElementById('res_'+code);var n=Number(el&&el.value||0);if(n>0) centers.push({center_code:code,reserved_plt:n});});});
    if(!centers.length) return toast("1개 이상 센터에 예약 PLT를 입력하세요","err");
    const overList=centers.map(function(x){
      const pending=dashboardPendingFor(x.center_code,dtype);
      const over=overReservationCount(pending,x.reserved_plt);
      return {center_code:x.center_code,pending:pending,reserved:x.reserved_plt,over:over};
    }).filter(function(x){return x.over>0;});
    if(overList.length){
      const lines=overList.map(function(x){return '- '+centerName(x.center_code)+': 준비 '+x.pending+' PLT / 예약 '+x.reserved+' PLT / 초과 '+x.over+' PLT';}).join('\n');
      const msg='⚠ 현재 준비완료 잔량보다 예약 PLT가 많습니다.\n\n'+lines+'\n\n곧 출고장에서 준비등록될 물량을 포함한 예약이라면 그대로 등록하세요.\n그래도 등록하시겠습니까?';
      if(!confirm(msg)){toast('초과예약 확인 후 등록이 취소됐습니다','warn');return;}
    }
    const res=await gsPost({action:'saveReservation',data:{reserve_group_id:S.editReservationGroupId||'',working_day:workingDay(),vehicle_no:veh,delivery_type:dtype,memo:memo,centers:centers,created_by:USER.loginId}});
    if(res&&res.ok){toast(S.editReservationGroupId?"예약 수정 완료":"예약 등록 완료");S.editReservationGroupId=null;await loadReservations(workingDay());await loadReservationSummary(workingDay());funcReservation();}
    else toast((res&&res.msg)||"예약 저장 실패 — Apps Script 최신본을 확인하세요","err");
  }finally{actionUnlock("saveReservation");unlockButton(btn);}
}
function editReservation(groupId){S.editReservationGroupId=groupId;funcReservation();}
async function cancelReservation(groupId){
  if(!confirm("해당 배정예약을 취소할까요?"))return;
  if(!actionLock("cancelReservation:"+groupId)) return toast("처리 중입니다","warn");
  try{const res=await gsPost({action:'cancelReservation',reserve_group_id:groupId});if(res&&res.ok){toast("예약 취소 완료");await loadReservations(workingDay());await loadReservationSummary(workingDay());funcReservation();}else toast((res&&res.msg)||"예약 취소 실패","err");}
  finally{actionUnlock("cancelReservation:"+groupId);}
}
function funcDepart(){const c=currentCenter(),loaded=loadedOf(c);document.getElementById("app").innerHTML=`${pageBackHtml()}<h2>상차내역·출차</h2>${loaded.length?'<ul class="list">'+loaded.map(l=>`<li class="li"><div>${labelView(l.code,"",l.method)} <span class="pill ${l.dtype==="당일"?"day":"norm"}">${l.dtype}</span>${l.viol?' <span class="pill viol">위반</span>':''}<div class="meta">${l.at} · 차량 ${l.vehicle||"-"}</div></div><button class="btn ghost" style="width:auto;padding:8px 12px;margin:0;font-size:13px;min-height:auto;${l.departed?"background:var(--gd);color:#fff;border-color:var(--gd)":""}" onclick="toggleDepart('${l.rowId}',${l.departed})">${l.departed?"출차완료":"출차"}</button></li>`).join("")+'</ul>':'<div class="empty">상차한 파렛트가 없습니다.</div>'}`;}
function funcAccounts(){
  if(GS_URL&&!(CACHE.accounts||[]).length){loadAccounts().then(funcAccounts);return;}
  const accs=CACHE.accounts||[];
  const editing=S.editAccountId?accs.find(function(a){return (a.id||a.account_id)===S.editAccountId;}):null;

  // 추가/수정 폼
  var formTitle=editing?"계정 수정 — "+editing.name:"계정 추가";
  var formHtml="<div class='card' style='"+(editing?"border:2px solid var(--g)":"")+"'>";
  formHtml+="<div style='font-weight:800;font-size:16px;margin-bottom:12px;"+(editing?"color:var(--gd)":"")+"'>"+formTitle+"</div>";
  if(!editing){
    formHtml+="<div class='info' style='margin-bottom:10px'>마스터 계정은 구글 시트 accounts 탭에서 직접 추가하세요.</div>";
  }
  formHtml+="<label>이름</label><input type='text' id='accName' value='"+(editing?editing.name||"":"")+"' placeholder='예: 홍길동'/>";
  formHtml+="<label>로그인ID</label><input type='text' id='accLogin' value='"+(editing?(editing.loginId||editing.login_id||""):"")+"' placeholder='예: out01'/>";
  formHtml+="<label>비밀번호"+(editing?" (변경 시에만 입력)":"")+"</label><input type='password' id='accPw' placeholder='"+(editing?"변경하지 않으면 비워두세요":"신규 계정 비밀번호")+"'/>";
  formHtml+="<label>권한등급</label><select class='formsel' id='accRole' onchange='onAccRoleChange()'>";
  formHtml+="<option value='out' "+(editing&&editing.role==="out"?"selected":"")+"'>출고장</option>";
  formHtml+="<option value='load' "+(editing&&editing.role==="load"?"selected":"")+"'>상차장</option>";
  if(editing&&editing.role==="master"){
    formHtml+="<option value='master' selected>마스터</option>";
  }
  formHtml+="</select>";
  formHtml+="<label>부여센터</label><select class='formsel' id='accCenter' "+(editing&&editing.role==="master"?"disabled":"")+"'>"+centerOptions(editing?editing.center||editing.assigned_center||"YI01":"YI01",false)+"</select>";
  formHtml+="<div class='row2' style='margin-top:12px'>";
  formHtml+="<button class='btn' onclick='saveAccount()'>"+(editing?"수정 저장":"계정 추가")+"</button>";
  formHtml+="<button class='btn ghost' onclick='resetAccountForm()'>"+(editing?"취소":"초기화")+"</button>";
  formHtml+="</div></div>";

  // 계정 목록
  var listHtml=accs.length?
    "<ul class='list'>"+accs.map(function(a){
      var isMasterAcc=a.role==="master";
      return "<li class='li'><div style='flex:1'><b>"+a.name+"</b> "+
        "<span class='pill "+(a.active?"day":"off")+"'>"+(a.active?"활성":"비활성")+"</span>"+
        " <span class='pill norm'>"+(isMasterAcc?"마스터":a.role==="out"?"출고장":"상차장")+"</span>"+
        "<div class='meta'>ID "+(a.loginId||a.login_id)+" · "+(a.role==="master"?"전 센터":centerName(a.center||a.assigned_center))+"</div>"+
        "</div><div class='acctActions'>"+
        "<button class='miniBtn green' onclick='editAccount(\""+(a.id||a.account_id)+"\")'>수정</button>"+
        (isMasterAcc
          ?"<span style='font-size:11px;color:var(--gray);padding:4px'>시트에서 관리</span>"
          :"<button class='miniBtn' onclick='toggleAccount(\""+(a.id||a.account_id)+"\")'>"+(a.active?"비활성":"활성")+"</button>"+
           "<button class='miniBtn red' onclick='deleteAccount(\""+(a.id||a.account_id)+"\")'>삭제</button>"
        )+
        "</div></li>";
    }).join("")+"</ul>"
    :"<div class='empty'>등록된 계정이 없습니다.</div>";

  document.getElementById("app").innerHTML=
    pageBackHtml()+
    "<h2>계정 관리</h2>"+
    formHtml+
    "<div class='sub'>계정 목록 ("+accs.length+")</div>"+
    listHtml+
    "<button class='btn ghost' style='margin-top:10px' onclick='loadAccounts().then(funcAccounts)'>목록 새로고침</button>";
}

// ── 초기 실행 ──────────────────────────────────────────
render();
if(GS_URL){
  checkConnection();
  // 이미 로그인된 마스터 계정이면 대시보드 집계 API 1회 호출
  if(USER&&USER.role==="master"){
    if(NAV.screen==="masterdash") masterRefreshDash();
    else loadDashboard();
  } else if(USER&&USER.role!=="master"){
    // 작업자는 내 센터만 로드
    loadData(USER.center||"YI01");
  }
} else {
  const b=document.getElementById("gsBanner");
  if(b){b.className="gsBanner fail";b.textContent="구글 시트 미연결 — 마스터 로그인 후 설정에서 URL을 입력하세요";}
}
</script>
